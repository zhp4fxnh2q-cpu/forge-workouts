// ═══ AUDIO BEEP FOR REST TIMER ═══
// iOS requires AudioContext to be created AND resumed from a user gesture (tap).
// We warm it up on the first user interaction so timer beeps work even on silent mode.
var _audioCtx=null;
var _audioWarmedUp=false;
function warmUpAudio(){
  try{
    if(!_audioCtx)_audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(_audioCtx.state==="suspended")_audioCtx.resume();
    if(!_audioWarmedUp){
      // Play a silent tone to unlock audio on iOS
      var osc=_audioCtx.createOscillator();
      var gain=_audioCtx.createGain();
      osc.connect(gain);gain.connect(_audioCtx.destination);
      gain.gain.value=0.001; // inaudible
      osc.start();osc.stop(_audioCtx.currentTime+0.01);
      _audioWarmedUp=true;
    }
  }catch(e){}
}
// Warm up on ANY user touch/click
if(typeof document!=="undefined"){
  document.addEventListener("touchstart",warmUpAudio,{once:false,passive:true});

  try{

    var osc=_audioCtx.createOscillator();

}

// ═══ TECHNIQUE DESCRIPTIONS ═══
var TECH_INFO={
  straight:{n:"Straight Sets",d:"Perform 3-4 sets of 8-12 reps with 90-120s rest between sets. Full recovery between sets. The proven default for hypertrophy."},
  myo:{n:"Myo-Reps",d:"Do one activation set of 12-20 reps to near failure. Rest 15 seconds (3-5 deep breaths). Do 3-5 mini-sets of 3-5 reps with 15s rest between each. Stop when you lose a rep from your first mini-set count. Equivalent hypertrophy in ~40% less time."},
  restpause:{n:"Rest-Pause",d:"Perform reps to failure (6-10 reps). Rack the weight, take 10-15 deep breaths (~20s). Perform reps to failure again (3-5 reps). Breathe again 20s. Final set to failure (2-3 reps). One extended set replaces 3 straight sets."},
  preexhaust:{n:"Pre-Exhaust Superset",d:"First do a band or DB isolation for 12-15 reps to fatigue the target muscle. Immediately (no rest) perform the compound movement. The pre-fatigued muscle becomes the weak link, making lighter compound loads feel much heavier."},
  mechanical:{n:"Mechanical Drop Set",d:"Use the SAME weight but change the angle or grip to make the exercise easier as you fatigue. Example: Incline press to failure, immediately flat press to failure, immediately decline/floor press to failure. No weight change needed."},
  density:{n:"Density (EDT)",d:"Pick two antagonist exercises (e.g., rows + press). Set a 15-minute timer. Alternate 5 reps of each with minimal rest. Count total reps. Next session, beat that number. Progressive overload through density, not load."},
  giant:{n:"Giant Set",d:"Four exercises for the same muscle group performed back-to-back with no rest. Example: Band flys x15, incline press x10, pushups to failure, band crossovers x15. Rest 2-3 min between rounds. 3-4 rounds total."},
  hiit:{n:"HIIT Cardio",d:"High intensity interval training. Follow the protocol listed (Tabata = 20s max effort / 10s rest x 8 rounds). Go all-out during work intervals."},
  steady:{n:"Steady State",d:"Maintain moderate, sustainable effort for the full duration. Heart rate 120-140 BPM zone."},
};

// ═══ EQUIPMENT INFERENCE ═══
// Returns "bw", "band", "db", or "tower" for a given exercise
function getEquip(ex) {
  // Check name-based rules FIRST (override type tag)
  if (/^Band |^Banded |Band-Bell/.test(ex.n)) return "band";
  if (/^DB |Dumbbell/.test(ex.n)) return "db";
  if (/Dead Bugs \(weighted\)/.test(ex.n)) return "db";
  if (/^Weighted /.test(ex.n)) return "db"; // Weighted dips/pullups need DBs for load
  // Unweighted tower exercises (just need pull-up bar / dip station)
  if (/^Chin-ups$|^Dips \(/.test(ex.n)) return "tower";
  if (/Commando Pull-ups|Hanging Leg Raises|Inverted Rows/.test(ex.n)) return "tower";
  // Bodyweight
  if (ex.t === "B") return "bw";
  return "db"; // Default: assume DB needed
}

// Equipment filter sets for preset programs
// "bw" = bodyweight only (pull-up bar allowed)
// "band" = bands + bodyweight
// "db" = dumbbells + bodyweight + tower
var EQUIP_FILTERS = {
  bw: function(ex) { var eq = getEquip(ex); return eq === "bw" || eq === "tower"; },
  band: function(ex) { var eq = getEquip(ex); return eq === "band" || eq === "bw" || eq === "tower"; },
  db: function(ex) { var eq = getEquip(ex); return eq === "db" || eq === "bw" || eq === "tower"; }
};

  if (!_fbDb || !_fbUser) return Promise.resolve();
  return _fbDb.collection("users").doc(_fbUser.uid).collection("data").doc(key).set({
    v: val, ts: firebase.firestore.FieldValue.serverTimestamp(), uid: _fbUser.uid
  }).catch(function(e) { console.warn("Cloud save error:", e.message); });
}
function cloudGet(key, fb) {

  return _fbDb.collection("users").doc(_fbUser.uid).collection("data").doc(key).get().then(function(doc) {
    if (doc.exists && doc.data() && doc.data().v !== undefined) return doc.data().v;
    return fb;
  }).catch(function(e) { console.warn("Cloud read error:", e.message); return fb; });
}

      batch.set(ref, { v: v, ts: firebase.firestore.FieldValue.serverTimestamp(), uid: _fbUser.uid });
    } catch(e) {}
  });
  return batch.commit().catch(function(e) { console.warn("Batch push error:", e.message); });
}
// Full sync: pull all cloud data to localStorage
function cloudPullAll() {
  if (!_fbDb || !_fbUser) return Promise.resolve();
  return _fbDb.collection("users").doc(_fbUser.uid).collection("data").get().then(function(snap) {
    snap.forEach(function(doc) {
      if (doc.data() && doc.data().v !== undefined) {
        // Timestamp-aware merge: only overwrite local if cloud is newer
        var cloudTs=doc.data().ts?doc.data().ts.toMillis?doc.data().ts.toMillis():0:0;
        var localTs=0;
        try{var lt=localStorage.getItem("_ts_"+doc.id);if(lt){var parsed=parseInt(lt);localTs=isNaN(parsed)?0:parsed;}}catch(e){}
        if(cloudTs>=localTs){
          try { localStorage.setItem(doc.id, JSON.stringify(doc.data().v)); } catch(e) {}
          try { localStorage.setItem("_ts_"+doc.id, String(cloudTs)); } catch(e) {}
        }
      }
    });
  }).catch(function(e) { console.warn("Cloud pull error:", e.message); });
}

// ═══ DEV MODE: separate localStorage namespace, no cloud sync ═══
var _devMode = false;
function devKey(key) { return _devMode ? "dev_" + key : key; }

// ═══ STORAGE HELPERS (localStorage + cloud sync) ═══
function sGet(key, fb) {

    var v = localStorage.getItem(devKey(key));
    if (v === null || v === undefined) return Promise.resolve(fb);
    return Promise.resolve(JSON.parse(v));
  } catch(e) { return Promise.resolve(fb); }
}

}
function dateStr() {

// ═══ TIMING MODEL (research: Schoenfeld 2016, rest period meta-analyses 2024) ═══
// All times in MINUTES. Includes set execution + rest + setup/transition.
var TIMING={
  // Per-set execution time (seconds) — 3s eccentric + 1s pause + 1.5s concentric + setup
  setDuration:function(reps){return Math.round((reps*4.5)+8);}, // ~4.5s/rep realistic tempo + 8s re-grip/setup
  // Rest periods (seconds) by context
  rest:{
    compoundHyp:120,    // 2 min between compound working sets (Schoenfeld: 2-3 min optimal)
    compoundStr:180,    // 3 min for strength-focused compounds
    isolation:60,       // 60s between isolation sets (standard)
    superset:15,        // transition between superset partners
    supersetRest:90,    // rest AFTER both exercises in superset
    giantTransit:10,    // transition between giant set exercises
    giantRest:150,      // rest between giant set rounds
    myoMini:15,         // 15s between myo-rep mini-sets (3-5 breaths)
    restPause:20,       // 20s between rest-pause clusters
    dropStrip:12,       // time to change weight in drop set
  },
  // Weight change time — PowerBlocks take ~15s to adjust, dumbbells ~20s, same weight 0s
  weightChange:15,      // seconds to change PowerBlock weight between exercises
  // Warmup: first compound of session needs 2-3 warmup sets (~2 min)
  warmup:{first:120,subsequent:45,isolation:0},
  // Exercise transition time (move to next station, set up bench angle, etc.)
  transition:25,
};

// ═══ TIME LEARNING SYSTEM ═══
// Stores actual vs estimated times per exercise/method combo to improve future predictions
function getTimeLearning(){try{var d=localStorage.getItem("forge_timeLearn");return d?JSON.parse(d):{};}catch(e){return {};}}
function saveTimeLearning(data){try{localStorage.setItem("forge_timeLearn",JSON.stringify(data));}catch(e){}}
// Returns a correction factor (e.g., 1.15 means you typically take 15% longer than estimated)
function getTimeFactor(){
  var learn=getTimeLearning();
  var ratios=[];
  var keys=Object.keys(learn);
  // Use most recent 20 sessions for rolling average
  for(var i=0;i<keys.length;i++){
    var entries=learn[keys[i]];
    if(entries&&entries.length>0){
      for(var j=Math.max(0,entries.length-5);j<entries.length;j++){
        if(entries[j].est>0)ratios.push(entries[j].actual/entries[j].est);
      }
    }
  }
  if(ratios.length<3)return 1.0; // not enough data yet
  ratios.sort(function(a,b){return a-b;});
  // Trim outliers (remove top/bottom 10%)
  var trim=Math.max(1,Math.floor(ratios.length*0.1));
  var trimmed=ratios.slice(trim,ratios.length-trim);
  if(!trimmed||trimmed.length===0)return 1.0;
  var sum=0;for(var k=0;k<trimmed.length;k++)sum+=trimmed[k];
  return Math.max(0.7,Math.min(1.5,sum/trimmed.length));
}

// Calculate total time for an exercise (minutes)
// Now accounts for weight changes and uses learned correction factor
function exTime(sets,reps,isCompound,isFirst,method){
  var sd=TIMING.setDuration(reps||10);
  var rest=isCompound?TIMING.rest.compoundHyp:TIMING.rest.isolation;
  var warmup=isFirst?TIMING.warmup.first:isCompound?TIMING.warmup.subsequent:0;
  var wc=TIMING.weightChange; // weight change time (once per exercise)

  if(method==="myo"){
    // Activation set (~50s) + 4 mini-sets (~20s each) with 15s rest = ~4 min total
    return Math.round((sd+4*(20+TIMING.rest.myoMini)+warmup+TIMING.transition+wc)/60*10)/10;
  }
  if(method==="restpause"){
    // 1 set to failure + 2 rest-pause clusters with 20s rest = ~3 min
    return Math.round((sd+2*(25+TIMING.rest.restPause)+warmup+TIMING.transition+wc)/60*10)/10;
  }
  if(method==="giant"){
    // Single exercise within a giant set circuit: execution + transition + weight change
    return Math.round((sd+TIMING.rest.giantTransit+wc)/60*10)/10;
  }
  if(method==="density"){return 15;} // EDT = fixed 15 min blocks
  if(method==="superset"||method==="preexhaust"){
    // Paired: execution * sets + transition between partners + rest after each round + weight change
    var ssTotal=sd*sets+TIMING.rest.superset*(sets-1)+TIMING.rest.supersetRest*Math.max(0,sets-1)+warmup+TIMING.transition+wc;
    return Math.round(ssTotal/60*10)/10;
  }
  // Straight sets: sets * (execution + rest) - last set no rest + warmup + transition + weight change
  var total=sets*sd+(sets-1)*rest+warmup+TIMING.transition+wc;
  return Math.round(total/60*10)/10;
}

// ═══ ATHLEANX EXPRESS AUTO-COMPRESS ═══
// When total estimated time exceeds target, compress workouts like AX 30-min Express:
// 1. Pair antagonist exercises into supersets (chest+back, bis+tris, quads+hams)
// 2. Reduce rest between isolation sets to 45s
// 3. Cut extra isolation volume (keep compounds)
// 4. Combine warmups (first compound warms everything)
var ANTAG_PAIRS={chest:"back",back:"chest",biceps:"triceps",triceps:"biceps",quads:"hams",hams:"quads",shoulders:"core",core:"shoulders"};
function expressCompress(exs,targetMins){
  var tot=exs.reduce(function(a,e){return a+e.time;},0);
  if(tot<=targetMins)return exs; // fits already

  // STEP 1: Reduce isolation rest (60s→45s saves ~0.5min per isolation exercise)
  var compressed=exs.map(function(e){
    if(e.tier!=="primer"&&e.tech==="straight"&&!e.name.match(/^DB (Bench|Incline|Floor|RDL|Squat|Row|Pull)/)){
      var oldTime=e.time;
      var newRest=45;
      var sd=TIMING.setDuration(parseInt(e.reps)||10);
      var newTime=Math.round((e.sets*sd+(e.sets-1)*newRest+TIMING.transition+TIMING.weightChange)/60*10)/10;
      return Object.assign({},e,{time:newTime,note:e.note+" [Express: 45s rest]"});
    }
    return e;
  });
  tot=compressed.reduce(function(a,e){return a+e.time;},0);
  if(tot<=targetMins)return compressed;

  // STEP 2: Pair antagonist exercises into supersets (saves ~1-2 min per pair)
  var paired={};var result=[];
  for(var i=0;i<compressed.length;i++){
    var ex=compressed[i];
    if(paired[i])continue;
    var antag=ANTAG_PAIRS[ex.muscle];
    if(antag&&ex.tech==="straight"&&ex.tier!=="primer"&&ex.tier!=="grit"){
      // Find an unpaired antagonist exercise
      for(var j=i+1;j<compressed.length;j++){
        if(!paired[j]&&compressed[j].muscle===antag&&compressed[j].tech==="straight"&&compressed[j].tier!=="primer"){
          // Pair them: save rest time by working during rest
          var savedTime=Math.round(Math.min(ex.time,compressed[j].time)*0.3*10)/10;
          result.push(Object.assign({},ex,{time:Math.max(1,ex.time-savedTime/2),note:ex.note+" [Superset with "+compressed[j].name+"]"}));
          result.push(Object.assign({},compressed[j],{time:Math.max(1,compressed[j].time-savedTime/2),note:compressed[j].note+" [Superset with "+ex.name+"]"}));
          paired[i]=true;paired[j]=true;
          break;
        }
      }
      if(!paired[i])result.push(ex);
    } else {
      result.push(ex);
    }
  }
  tot=result.reduce(function(a,e){return a+e.time;},0);
  if(tot<=targetMins)return result;

  // STEP 3: Cut sets on isolation exercises (4→3, 3→2)
  result=result.map(function(e){
    if(tot<=targetMins)return e;
    if(e.tier!=="primer"&&e.tier!=="strength"&&e.tier!=="grit"&&e.muscle!=="cardio"&&e.sets>2){
      var cutSets=e.sets-1;
      var sd2=TIMING.setDuration(parseInt(e.reps)||10);
      var rest2=60;
      var newTime2=Math.round((cutSets*sd2+(cutSets-1)*rest2+TIMING.transition+TIMING.weightChange)/60*10)/10;
      var saved2=e.time-newTime2;
      tot-=saved2;
      return Object.assign({},e,{sets:cutSets,time:newTime2,note:e.note+" [Express: -1 set]"});
    }
    return e;
  });

  return result;
}

// ═══ VOLUME LANDMARKS (cross-referenced: Pelland 2025 meta-regression, Schoenfeld 2017, Nuckols) ═══
// NOTE: RP's specific numbers are heuristics, not research constants.
// These values reflect the RESEARCH CONSENSUS, not just RP:
// - Pelland 2025: diminishing returns past ~12 sets/wk, logarithmic dose-response
// - Schoenfeld 2017: 10+ sets > 5 sets (significant); 0.37% gain per additional set
// - Per-session cap: 6-8 sets (Nuckols, Pelland 2025 junk volume threshold)
// - SRA varies by muscle size (small: 36-48h, large: 72-96h)
var VOL_LM={
  chest:{mev:10,mav:16,mrv:22,sra:72,cap:8},back:{mev:10,mav:18,mrv:25,sra:72,cap:8},
  shoulders:{mev:8,mav:16,mrv:22,sra:48,cap:8},biceps:{mev:6,mav:14,mrv:22,sra:36,cap:6},
  triceps:{mev:6,mav:14,mrv:22,sra:36,cap:6},quads:{mev:8,mav:16,mrv:20,sra:96,cap:6},
  hams:{mev:6,mav:14,mrv:20,sra:72,cap:6},core:{mev:4,mav:10,mrv:16,sra:48,cap:6},
};
// Indirect volume overlap (compound→secondary, fractional credit)
var OVERLAP={chest:{triceps:0.5,shoulders:0.3},back:{biceps:0.5,shoulders:0.2},shoulders:{triceps:0.3},quads:{hams:0.2,core:0.3},hams:{core:0.2}};

// ═══ RIR SYSTEM (Robinson 2024: proximity to failure matters, but 2-3 RIR ≈ 0 RIR for hypertrophy) ═══
// Research: Training at 2-3 RIR produces ~equivalent hypertrophy to 0 RIR with less fatigue.
// We ramp from 3 RIR (sustainable) to 1 RIR (peak week), NOT to true failure.
// This is a science-based departure from RP's 4→0 ramp.
function getRIR(wk,ml){
  if(!ml||ml<2)return 3;
  // Research-backed RIR ramp: starts at 3-4 RIR, ramps to 1 RIR at peak
  // Supports any meso length (4-12+ weeks) via formula instead of fixed arrays
  if(wk>ml)return 3; // deload week = easy
  var pct=wk/ml; // 0..1 progress through meso
  if(pct<=0.25)return 4; // first quarter: conservative, technique focus
  if(pct<=0.5)return 3;  // second quarter: building
  if(pct<=0.75)return 2; // third quarter: pushing
  return 1;              // final quarter: peak intensity
}
function getMesoPhase(wk,ml){if(wk>ml)return "deload";if(wk===1)return "intro";if(wk>=ml)return "peak";return "accumulate";}

// ═══ SCIENCE-BASED FEEDBACK → VOLUME ADJUSTMENT (-2 to +2) ═══
// Research corrections applied:
// - Soreness (DOMS) does NOT correlate with growth (PMID: 34431437). Used ONLY as recovery indicator.
// - Pump is NOT a reliable growth signal. Removed as primary feedback.
// - Performance (progressive overload) IS validated as #1 indicator.
// - Systemic fatigue IS a valid overtraining signal.
// - Joint pain IS a valid exercise-swap trigger.
// Signals: perf(0-2), recovery(0-2), disruption(0-2), joint(0-2)
function calcVolAdj(fb){
  var s=0;
  // Performance is THE primary signal (validated by all research)
  if(fb.perf===2)s+=1;else if(fb.perf===0)s-=1;
  // Recovery readiness (replaces "soreness" - how recovered do you FEEL, not DOMS)
  if(fb.recovery===2)s+=1;else if(fb.recovery===0)s-=1;
  // Systemic disruption (fatigue affecting daily life, sleep, appetite)
  if(fb.disruption>=2)s-=2;else if(fb.disruption===1)s-=1;
  // Joint/connective tissue stress (exercise swap trigger, also volume signal)
  if(fb.joint>=2)s-=2;else if(fb.joint===1)s-=1;
  return Math.max(-2,Math.min(2,s));
}

// ═══ WEEKLY VOLUME CALCULATOR (MEV→MAV ramp + feedback + overlap) ═══
// Now actually computes overlap from the OVERLAP map instead of requiring caller to pass it
function calcWeekVol(muscle,wk,ml,goalMul,fbAdj,primarySetsMap){
  var lm=VOL_LM[muscle];if(!lm)return 10;
  var frac=(wk-1)/Math.max(1,ml-1);
  var base=lm.mev+Math.round((lm.mav-lm.mev)*frac);
  base=Math.round(base*(goalMul||1));
  base+=(fbAdj||0);
  // Subtract indirect volume from compound overlap
  var overlapSets=0;
  if(primarySetsMap){
    var sources=Object.keys(OVERLAP);
    for(var si=0;si<sources.length;si++){
      var src=sources[si];
      if(OVERLAP[src][muscle]&&primarySetsMap[src]){
        overlapSets+=Math.round((primarySetsMap[src]||0)*OVERLAP[src][muscle]);
      }
    }
  }
  base-=overlapSets;
  return Math.max(lm.mev,Math.min(lm.mrv,base));
}

// ═══ REACTIVE DELOAD DETECTION (research: Henselmans 2024, deload survey) ═══
// Science says: reactive/autoregulated deloads ≥ pre-planned deloads.
// We trigger deload based on ACCUMULATED SIGNALS, not arbitrary timing.
// Mandatory only when meso length exceeded (structural periodization boundary).
function shouldDeload(wk,ml,muscleVols,fbHist,readHist){
  if(wk>ml)return true; // structural boundary
  var signals=0;
  // Signal 1: Multiple muscles near MRV
  var atMRV=0;var ms=Object.keys(VOL_LM);
  for(var i=0;i<ms.length;i++){if((muscleVols[ms[i]]||0)>=VOL_LM[ms[i]].mrv)atMRV++;}
  if(atMRV>=3)signals+=2;else if(atMRV>=2)signals+=1;
  // Signal 2: Performance declining (THE most reliable signal)
  if(fbHist&&fbHist.length>=2){var lt=fbHist.slice(-2);if(lt[0].perf<=0&&lt[1].perf<=0)signals+=2;}
  if(fbHist&&fbHist.length>=3){var lt3=fbHist.slice(-3);if(lt3.every(function(f){return f.perf<=0;}))signals+=1;}
  // Signal 3: Readiness consistently low
  if(readHist&&readHist.length>=2){var lr=readHist.slice(-2);if(lr[0]<0.65&&lr[1]<0.65)signals+=2;}
  // Signal 4: Systemic disruption reported
  if(fbHist&&fbHist.length>=1&&fbHist[fbHist.length-1].disruption>=2)signals+=1;
  // Threshold: 3+ signals = full deload, 2 = partial deload warning
  return signals>=3;
}
// Deload severity: adaptive reduction based on signal count (research: 30-70% based on severity)
function getDeloadSeverity(signals){
  if(signals>=4)return 0.4; // severe: reduce to 40% volume
  if(signals>=3)return 0.5; // standard: reduce to 50%
  if(signals>=2)return 0.65; // mild: reduce to 65%
  return 1.0; // no deload needed
}

// ═══ TRIPLE PROGRESSION: REPS → WEIGHT → SETS (all 3 overload levers) ═══
// Progressive overload isn't just "add sets". The system now prioritizes:
// 1. REPS: same weight, push toward top of rep range
// 2. WEIGHT: hit top of range on all sets → bump weight, reset to bottom of range
// 3. SETS: already progressing weight AND reps well → add a set (within limits)
function getProgression(exName,hist,repRange,numSets){
  if(!repRange)repRange="8-12";var p=repRange.split("-");
  var lo=isNaN(parseInt(p[0]))?8:parseInt(p[0]);var hi=isNaN(parseInt(p[1]))?12:parseInt(p[1]);
  numSets=numSets||3;
  var maxSets=5; // MRV ceiling per exercise per session
  if(!hist||hist.length===0)return{action:"start",weight:null,targetReps:lo,note:"First time — find your "+lo+"-rep weight",sugSets:null,lever:"start"};
  var ls=hist[0];if(!ls.sets||ls.sets.length===0)return{action:"start",weight:null,targetReps:lo,note:"No prior data",sugSets:null,lever:"start"};
  if(!ls.sets[0]||ls.sets[0].w===undefined||ls.sets[0].w===null)return{action:"start",weight:null,targetReps:lo,note:"Incomplete data — log weight next time",sugSets:null,lever:"start"};
  var lw=ls.sets[0].w;var allTop=true;var anyLow=false;var avg=0;
  var prevSets=ls.sets.length;
  for(var i=0;i<ls.sets.length;i++){avg+=ls.sets[i].r;if(ls.sets[i].r<hi)allTop=false;if(ls.sets[i].r<lo)anyLow=true;}
  avg=Math.round(avg/ls.sets.length);

  // Compute total volume last session for comparison
  var lastVol=0;for(var vi=0;vi<ls.sets.length;vi++){lastVol+=ls.sets[vi].w*ls.sets[vi].r;}

  // Build per-set suggestions with fatigue model (7% rep drop per set)
  var sugSets=[];

  // ── LEVER 1: WEIGHT UP ──
  // All sets at top of rep range → increase weight, reset reps to bottom
  // No hard cap: user's equipment determines ceiling, not arbitrary limits
  if(allTop){
    var nw=lw>=40?lw+5:lw>=20?lw+2.5:lw+1;
    for(var si=0;si<numSets;si++){
      var fatigueReps=Math.max(lo,Math.round(lo*(1-si*0.07)));
      sugSets.push({w:nw,r:fatigueReps});
    }
    return{action:"increase",weight:nw,targetReps:lo,lever:"weight",
      note:"Hit "+hi+" on all sets → bump to "+nw+"lb × "+lo+" reps",sugSets:sugSets};
  }

  // ── LEVER 3: SETS UP (check before reps to see if we should suggest it) ──
  // If avg reps are in the upper half of range AND we haven't maxed sets AND
  // we've been at this weight for 2+ sessions → suggest adding a set
  var sessionsAtWeight=0;
  for(var hi2=0;hi2<hist.length;hi2++){
    if(hist[hi2].sets&&hist[hi2].sets.length>0&&hist[hi2].sets[0].w===lw)sessionsAtWeight++;
    else break;
  }
  var midRange=lo+Math.round((hi-lo)*0.5);
  var canAddSet=numSets<maxSets&&prevSets>=numSets;
  if(canAddSet&&avg>=midRange&&sessionsAtWeight>=2&&!anyLow){
    var extraSets=numSets+1;
    for(var si3=0;si3<extraSets;si3++){
      var fatR3=Math.max(lo,Math.round(avg*(1-si3*0.07)));
      sugSets.push({w:lw,r:fatR3});
    }
    return{action:"addset",weight:lw,targetReps:avg,lever:"sets",
      note:lw+"lb × "+avg+" for "+prevSets+" sets → try "+(prevSets+1)+" sets (more volume)",sugSets:sugSets};
  }

  // ── STALL-AWARE COACHING ──
  // Before defaulting to "more reps", check if we're actually stalled
  // A stall = same weight for 2+ sessions without hitting top of range
  if(sessionsAtWeight>=2&&!allTop){
    // Find which stall ladder step applies
    var stallIdx=-1;
    for(var sli=0;sli<STALL_LADDER.length;sli++){
      if(sessionsAtWeight>=STALL_LADDER[sli].minSessions)stallIdx=sli;
    }
    if(stallIdx>=0){
      var stallStep=STALL_LADDER[stallIdx];
      var targetR2=Math.min(avg+1,hi);
      for(var si4=0;si4<numSets;si4++){
        var fatR4=Math.max(lo,Math.round(targetR2*(1-si4*0.07)));
        sugSets.push({w:lw,r:fatR4});
      }
      var tierLabel=stallStep.tier===1?"SHORT":stallStep.tier===2?"MEDIUM":"LONG";
      return{action:"stall",weight:lw,targetReps:targetR2,lever:"stall",stallTier:stallStep.tier,
        note:sessionsAtWeight+" sessions at "+lw+"lb ("+tierLabel+" STALL). "+stallStep.step+": "+stallStep.desc,sugSets:sugSets};
    }
  }

  // ── LEVER 2: REPS UP ──
  // Default path: same weight, push for +1 rep toward top of range
  var targetR=Math.min(avg+1,hi);
  for(var si2=0;si2<numSets;si2++){
    var fatR2=Math.max(lo,Math.round(targetR*(1-si2*0.07)));
    sugSets.push({w:lw,r:fatR2});
  }
  if(anyLow){
    return{action:"maintain",weight:lw,targetReps:avg,lever:"reps",
      note:lw+"lb × "+Math.min(avg+1,hi)+" reps — build up before adding weight",sugSets:sugSets};
  }
  return{action:"progress",weight:lw,targetReps:targetR,lever:"reps",
    note:lw+"lb × "+targetR+" reps (beat last session's "+avg+")",sugSets:sugSets};
}

// ═══ STALL DETECTION (RIR-aware: 0=ok, 1=watch, 2=stalled, 3=regressing, -1=fatigued) ═══
// Now uses RIR: if same weight/reps but RIR is dropping → you're accumulating fatigue, not stalling.
// That's a deload signal, not a "push harder" signal.
function detectStall(hist){
  if(!hist||hist.length<2)return 0;
  function best(s){var b={w:0,r:0,v:0,rir:null};if(!s.sets)return b;for(var i=0;i<s.sets.length;i++){var v=s.sets[i].w*s.sets[i].r;if(v>b.v){b={w:s.sets[i].w,r:s.sets[i].r,v:v,rir:s.sets[i].rir!==undefined?s.sets[i].rir:null};}}return b;}
  var l=best(hist[0]);var p=best(hist[1]);
  // Volume regression
  if(l.v<p.v*0.95)return 3;
  // Check for RIR-based fatigue: same weight/reps but RIR dropped → fatigue, not stall
  if(l.w===p.w&&l.r<=p.r&&l.rir!==null&&p.rir!==null){
    if(l.rir<p.rir)return -1; // FATIGUED: same performance but harder effort → need deload
  }
  // Standard stall: same weight, same or fewer reps, no RIR drop
  if(!(l.w===p.w&&l.r<=p.r))return 0;

// ═══ SEEDED RANDOM (deterministic shuffle that changes per session/week/generation) ═══
// Simple mulberry32 PRNG — given same seed, produces same sequence; different seed = different workout
function mulberry32(seed){var t=seed+0x6D2B79F5;return function(){t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296;};}
function seededShuffle(arr,rng){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(rng()*((i)+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}
  return a;
}
// Tier shuffle: group by score bands, shuffle WITHIN each band so similar-scored exercises rotate
function tierShuffle(scored,rng){
  if(scored.length<=1)return scored;
  // Group into bands of 8 points (exercises within 8pts of each other are "same tier")
  var bands=[];var cur=[];var lastS=scored[0]._score;
  for(var i=0;i<scored.length;i++){
    if(Math.abs(scored[i]._score-lastS)>8){bands.push(cur);cur=[];lastS=scored[i]._score;}
    cur.push(scored[i]);
  }
  if(cur.length)bands.push(cur);
  var out=[];
  for(var b=0;b<bands.length;b++){out=out.concat(seededShuffle(bands[b],rng));}
  return out;
}

function scoreEx(ex,mid,hist,goalId,slotType,equipFilter){
  // slotType: "compound","isolation","any" — helps contextualize scoring
  // equipFilter: "band","bw","db",null — from preset selection
  var s=ex.m*10;
  // Method compatibility bonus (research: technique-specific exercises score higher)
  if(mid==="myo"&&ex.myo)s+=20;if(mid==="mech"&&ex.drop)s+=20;
  if(mid==="preexh"&&ex.t==="I")s+=15;if(mid==="dc"&&ex.t==="C")s+=15;
  // Stretch-mediated hypertrophy bonus (Wolf 2025 — lengthened partial research)
  if(STRETCH_BONUS[ex.n])s+=STRETCH_BONUS[ex.n];
  // Compound priority (CNS-first principle, Stronger by Science)
  if(ex.t==="C")s+=10;
  // Anchor exercise bonus (repeated bout effect — maintain key lifts across meso)
  if(ANCHOR_EX[ex.n])s+=8;
  // GOAL-BASED PRIORITY
  var gp=GOAL_EX_PRIORITY[goalId||"balanced"]||{};
  if(gp[ex.n])s+=gp[ex.n];
  // ═══ BAND vs DB PRIORITIZATION (context-aware) ═══
  var isBand=isBandExercise(ex);
  var isDB=ex.n.indexOf("DB ")===0||ex.n.indexOf("Dumbbell")>=0;
  // Only penalize bands when NOT using a band-focused program
  if(equipFilter!=="band"){
    // De-emphasize bands for compound/heavy slots — DBs offer better progressive overload
    if(isBand&&ex.t==="C")s-=20;
    if(isBand&&slotType==="compound")s-=15;
    // DB exercises get compound slot boost (heavier loading, better strength transfer)
    if(isDB&&ex.t==="C")s+=6;
    if(isDB&&slotType==="compound")s+=5;
    // Method-specific: straight/dc/hybrid prefer DB for progressive overload tracking
    if(isBand&&(mid==="straight"||mid==="dc"||mid==="hybrid"))s-=5;
  } else {
    // Band-focused program (Elast-X): BOOST band exercises
    if(isBand)s+=10;
    if(isBand&&ex.t==="C")s+=5;
  }
  // Bands are effective for isolations (constant tension, metabolic stress) regardless of program
  if(isBand&&ex.t==="I"&&slotType==="isolation")s+=3;
  // ═══ STIMULUS-TO-FATIGUE RATIO (SFR) ═══
  // Machine/isolation exercises = higher SFR (less systemic fatigue per set)
  // Heavy compounds = lower SFR (more systemic fatigue) — use strategically
  if(ex.t==="I")s+=2; // slight SFR bonus for isolations
  // ═══ STALL DETECTION (method-aware) ═══
  if(hist&&hist[ex.n]){
    var st=detectStall(hist[ex.n]);
    if(st>=3)s-=25;else if(st>=2)s-=10;
    // Rotation pressure for non-anchor exercises (DC research: rotate after stall)
    if(!ANCHOR_EX[ex.n]&&hist[ex.n].length>=5){
      s-=Math.min(20,hist[ex.n].length*3);
    }
  }
  // Freshness bonus: exercises NOT in history get a novelty bonus
  if(hist&&!hist[ex.n]&&!ANCHOR_EX[ex.n])s+=12;
  return s;
}

// ═══ READINESS → VOLUME/INTENSITY MODIFIER ═══
function readinessMod(score){
  if(score>=1.0)return{vol:1.05,note:"Full send - +1 set per muscle"};
  if(score>=0.9)return{vol:1.0,note:"Hit targets"};
  if(score>=0.8)return{vol:0.95,note:"Proceed as planned"};
  if(score>=0.7)return{vol:0.85,note:"Drop 1 set per muscle"};
  if(score>=0.6)return{vol:0.7,note:"Drop 2 sets, -10% weight"};
  return{vol:0.5,note:"Active recovery or deload"};
}

// ═══ GARMIN CONNECT CSV PARSER ═══
// Parses Garmin health export CSVs and maps to FORGE readiness scores
// Garmin Connect → Export Data → Health Snapshot / Sleep / Stress
function parseGarminCSV(text){
  var lines=text.trim().split("\n");
  if(lines.length<2)return null;
  // Parse header
  var hdr=lines[0].toLowerCase().replace(/"/g,"").split(",").map(function(h){return h.trim();});
  // Find relevant columns by common Garmin export names
  var colMap={};
  hdr.forEach(function(h,i){
    if(h.match(/sleep.*(score|quality)/i))colMap.sleep=i;
    else if(h.match(/^sleep$/i)&&!colMap.sleep)colMap.sleep=i;
    else if(h.match(/stress.*(score|avg|average)/i))colMap.stress=i;
    else if(h.match(/^stress$/i)&&!colMap.stress)colMap.stress=i;
    else if(h.match(/body.*battery/i))colMap.battery=i;
    else if(h.match(/resting.*h(ear)?t.*r(ate)?/i))colMap.rhr=i;
    else if(h.match(/^rhr$/i))colMap.rhr=i;
    else if(h.match(/date|timestamp|time|day/i)&&!colMap.date)colMap.date=i;
    else if(h.match(/hrv|heart.*rate.*var/i))colMap.hrv=i;
  });
  // Parse rows - take the most recent valid row
  var latest=null;
  for(var r=lines.length-1;r>=1;r--){
    var cols=lines[r].replace(/"/g,"").split(",").map(function(c){return c.trim();});
    var row={};
    if(colMap.date!==undefined)row.date=cols[colMap.date];
    if(colMap.sleep!==undefined){var v=parseFloat(cols[colMap.sleep]);if(!isNaN(v))row.sleep=v;}
    if(colMap.stress!==undefined){var v=parseFloat(cols[colMap.stress]);if(!isNaN(v))row.stress=v;}
    if(colMap.battery!==undefined){var v=parseFloat(cols[colMap.battery]);if(!isNaN(v))row.battery=v;}
    if(colMap.rhr!==undefined){var v=parseFloat(cols[colMap.rhr]);if(!isNaN(v))row.rhr=v;}
    if(colMap.hrv!==undefined){var v=parseFloat(cols[colMap.hrv]);if(!isNaN(v))row.hrv=v;}
    if(row.sleep!==undefined||row.stress!==undefined||row.battery!==undefined){latest=row;break;}
  }
  if(!latest)return null;
  // Map Garmin metrics → FORGE readiness option indices
  // sleep: 0-100 score → 0=Terrible(0-30), 1=Poor(31-50), 2=OK(51-65), 3=Good(66-80), 4=Great(81+)
  // stress: 0-100 (lower=calmer) → 0=Very stressed(76+), 1=Stressed(51-75), 2=Normal(26-50), 3=Great(0-25)
  // battery: 0-100 → 0=Exhausted(0-20), 1=Low(21-40), 2=Normal(41-70), 3=Wired(71+)
  var mapped={};
  if(latest.sleep!==undefined){
    var s=latest.sleep;
    mapped.sleep=s>80?4:s>65?3:s>50?2:s>30?1:0;
    mapped.sleepRaw=s;
  }
  if(latest.stress!==undefined){
    var s=latest.stress;
    mapped.stress=s<=25?3:s<=50?2:s<=75?1:0;
    mapped.stressRaw=s;
  }
  if(latest.battery!==undefined){
    var b=latest.battery;
    mapped.energy=b>70?3:b>40?2:b>20?1:0;
    mapped.batteryRaw=b;
  }
  if(latest.rhr!==undefined)mapped.rhrRaw=latest.rhr;
  if(latest.hrv!==undefined)mapped.hrvRaw=latest.hrv;
  if(latest.date)mapped.date=latest.date;
  mapped.importedAt=new Date().toISOString();
  return mapped;
}

function buildProgram(splitObj,methodObj,goalObj,mins,weekNum,mesoLen,fbAdj,exHistory,readMod,genCount,banned,equipFilter){

  // ── PHASE 1: Compute weekly volume per muscle WITH overlap ──
  // First pass: estimate primary sets per muscle to calculate overlap
  var primarySetsEst={};
  var allMuscles=Object.keys(VOL_LM);
  for(var mi=0;mi<allMuscles.length;mi++){
    var m=allMuscles[mi];var vm=goalObj.vol[m]||1;
    primarySetsEst[m]=calcWeekVol(m,wk,ml,vm,fbAdj?fbAdj[m]:0,null);
  }
  // Second pass: compute final weekly volume with overlap subtracted
  var weeklyVols={};
  for(var mi2=0;mi2<allMuscles.length;mi2++){
    var m2=allMuscles[mi2];var vm2=goalObj.vol[m2]||1;
    weeklyVols[m2]=calcWeekVol(m2,wk,ml,vm2,fbAdj?fbAdj[m2]:0,primarySetsEst);
  }

  splitObj.layout.forEach(function(day,di){var exs=[];var used=0;var firstComp=true;
    // Pre-calculate time budget per muscle group to ensure ALL groups get time
    var totalTime=lm*tm;var numGroups=day.g.length;var timePerGroup=Math.max(5,Math.floor(totalTime/Math.max(1,numGroups)));
    var muscleIdx=0;
    day.g.forEach(function(muscle){
      var pool=EX[muscle];if(!pool)return;pool=pool.filter(function(e){return banned.indexOf(e.n)<0;});
      // Equipment filter: restrict exercises to matching equipment type
      if(equipFilter&&EQUIP_FILTERS[equipFilter]){pool=pool.filter(EQUIP_FILTERS[equipFilter]);}
      if(pool.length===0)return;
      // ── VOLUME: weekly target ÷ frequency = session target (FIX: divide AMONG exercises, not per-exercise) ──
      var weeklyTarget=weeklyVols[muscle]||10;
      var freq=Math.max(1,splitObj.layout.filter(function(d){return d.g.indexOf(muscle)>=0;}).length);
      var sessionTarget=Math.ceil(weeklyTarget/freq);
      var cap=VOL_LM[muscle]?VOL_LM[muscle].cap:10;
      sessionTarget=Math.min(sessionTarget,cap); // per-session cap (Pelland 2025)
      // Apply readiness modifier to session volume
      sessionTarget=Math.max(2,Math.round(sessionTarget*rm));
      if(phase==="deload")sessionTarget=Math.max(2,Math.ceil(sessionTarget*0.5));
      // cnt = number of EXERCISES for this muscle (sessionTarget sets divided among them)
      var numExercises=Math.max(1,Math.min(3,Math.ceil(sessionTarget/3))); // ~3 sets each
      // Time guard: ensure each muscle group gets fair time (not first-come-first-served)
      var myBudget=timePerGroup;if(muscleIdx===numGroups-1)myBudget=totalTime-used; // last group gets remainder
      var avail=Math.max(5,Math.min(myBudget,totalTime-used));if(avail<5){muscleIdx++;return;}
      numExercises=Math.min(numExercises,Math.max(1,Math.floor(avail/5)));if(numExercises<1)numExercises=1;
      muscleIdx++;
      var groupUsed=0; // Track time used within THIS muscle group's budget
      var setsPerExercise=Math.max(2,Math.min(4,Math.ceil(sessionTarget/numExercises)));

      // Compute daySeed BEFORE primer so primer rotation works
      var daySeed=baseSeed+di*251+muscle.charCodeAt(0)*13;

      // ── TIER 1: PRIMER (band/bodyweight activation, rotated with seed) ──
      if(phase!=="deload"&&methodObj.tiers&&methodObj.tiers.primer&&PRIMERS[muscle]){
        var primerRng=mulberry32(daySeed+77);
        var primer=PRIMERS[muscle][Math.floor(primerRng()*PRIMERS[muscle].length)];
        exs.push({name:primer.n,muscle:muscle,tech:"primer",sets:2,reps:"10-15",time:2,mv:primer.mv,note:"PRIMER: Light activation. Wake up the muscle and stabilizers before heavy work.",tier:"primer"});
        used+=2;groupUsed+=2;
      }

      // Score all exercises, attach score, then tier-shuffle so similar-scored exercises rotate
      var rng=mulberry32(daySeed);
      var scoredRaw=pool.slice().map(function(e){var c={};for(var k in e)c[k]=e[k];c._score=scoreEx(e,mid,exHistory,gid,e.t==="C"?"compound":"isolation",equipFilter);return c;});
      scoredRaw.sort(function(a,b){return b._score-a._score;});
      var scored=tierShuffle(scoredRaw,rng);
      var comps=scored.filter(function(e){return e.t==="C";});
      var isos=scored.filter(function(e){return e.t!=="C"&&e.t!=="B";});
      var bw=scored.filter(function(e){return e.t==="B";});
      // Rotation offset: varies by day index, week, and generation so you don't always start at [0]
      var off=Math.floor(rng()*Math.max(1,comps.length));

      // ── TIER 2: STRENGTH (first compound per muscle, heavy, 3x3-6) ──
      // Only when method supports strength tier AND goal is strength/athletic
      if(methodObj.tiers&&methodObj.tiers.str&&isStrGoal&&phase!=="deload"&&comps.length>0){
        var strEx=comps.length>0?comps[off%comps.length]:null;if(!strEx)return;
        var strTime=exTime(3,5,true,firstComp,"straight")+1; // +1 for longer rest (3 min)
        if(groupUsed+strTime>avail){muscleIdx++;return;} // Budget guard
        exs.push({name:strEx.n,muscle:muscle,tech:"strength",sets:3,reps:strReps,time:strTime,mv:strEx.mv,note:"STRENGTH: Heavy compound. 3 min rest. Focus on maximal force production. "+rir+" RIR.",tier:"strength",rir:rir});
        firstComp=false;used+=strTime;groupUsed+=strTime;
        sessionTarget-=3; // Subtract strength sets from hypertrophy budget
        if(sessionTarget<=0)return;
        setsPerExercise=Math.max(2,Math.min(4,Math.ceil(sessionTarget/Math.max(1,numExercises-1))));
      }

      // ── PRE-EXHAUST (Arthur Jones / Mike Mentzer): isolation FIRST → compound superset ──
      // Research: Rest <60s between iso and compound to maintain pre-exhaust effect.
      // Best for 1-2 lagging muscles per block. Reduces compound force output but
      // ensures target muscle is limiting factor (not synergists).
      if(mid==="preexh"){
        var iso1=isos.length>0?isos[Math.floor(rng()*isos.length)]:null;
        var comp1=comps.length>0?comps[off%comps.length]:null;
        var pxTime=0;
        if(iso1&&comp1){pxTime=exTime(3,13,false,false,"superset")+exTime(3,10,true,firstComp,"superset")+Math.round(3*TIMING.rest.supersetRest/60);}
        if(iso1&&comp1&&groupUsed+pxTime<=avail){
          exs.push({name:iso1.n,muscle:muscle,tech:"preexhaust",sets:3,reps:"12-15 to near failure",time:Math.round(pxTime/2),mv:iso1.mv,note:"PRE-EXHAUST: Do this FIRST. Focus on squeeze and controlled tempo. No rest — go straight into compound within 10-15 seconds."});
          exs.push({name:comp1.n,muscle:muscle,tech:"preexhaust",sets:3,reps:"8-12",time:Math.round(pxTime/2),mv:comp1.mv,note:"SUPERSET: Immediately after isolation (<60s gap required). Target muscle is pre-fatigued so use ~10-15% less weight than normal. Rest 2 min between rounds."});
          firstComp=false;used+=pxTime;groupUsed+=pxTime;
        }
        return;
      }

      // ── GIANT SETS: 4 exercises per muscle, circuit ──
      if(mid==="giant"){
        var giants=[];
        // Shuffle and pick 4 from the full scored pool for variety
        var giantPool=seededShuffle(scored.slice(0,Math.min(8,scored.length)),rng);
        for(var gi=0;gi<Math.min(4,giantPool.length);gi++){
          var gx=giantPool[gi];
          if(gx)giants.push(gx);
        }
        if(giants.length>=3){
          giants.forEach(function(gx,gxi){
            var gtTime=exTime(3,gx.t==="I"?13:9,gx.t==="C",false,"giant");
            if(groupUsed+gtTime>avail)return; // Budget guard: skip excess exercises
            exs.push({name:gx.n,muscle:muscle,tech:"giant",sets:3,reps:gx.t==="I"?"12-15":"8-10",time:gtTime,mv:gx.mv,note:"Giant set "+(gxi+1)+"/"+giants.length+(gxi<giants.length-1?" - NO REST, go straight to next":"  - REST 2-3 min, repeat circuit")});
            used+=gtTime;groupUsed+=gtTime;
          });
          return;
        }
      }

      // ── DENSITY/EDT: pair exercises in timed blocks ──
      if(mid==="density"){
        var comp2=comps.length>0?comps[off%comps.length]:null;
        var densityTime=Math.min(15,avail-groupUsed); // Cap at group budget
        if(comp2&&densityTime>=5){
          exs.push({name:comp2.n,muscle:muscle,tech:"density",sets:1,reps:"5 reps per round",time:densityTime,mv:comp2.mv,note:"EDT block: alternate with next exercise, 5 reps each, minimal rest, "+densityTime+" min timer. Beat total reps next session."});
          used+=densityTime;groupUsed+=densityTime;
        }
        return;
      }

      // ── MECHANICAL DROP SETS: hardest angle first, same weight ──
      if(mid==="mech"){
        var mechOrder=comps.filter(function(e){return e.drop;}).slice(0,3);
        if(mechOrder.length>=2){
          mechOrder.forEach(function(mx,mxi){
            var mxTime=mxi===0?exTime(3,8,true,firstComp,"straight"):1;
            if(groupUsed+mxTime>avail)return; // Budget guard
            exs.push({name:mx.n,muscle:muscle,tech:"mechanical",sets:mxi===0?3:0,reps:"to failure",time:mxTime,mv:mx.mv,note:mxi===0?"Mechanical drop: start here at hardest angle, go to failure":"SAME WEIGHT - immediately switch to this easier angle, to failure"});
            if(mxi===0)firstComp=false;used+=mxTime;groupUsed+=mxTime;
          });
          return;
        }
      }

      // ── MYO-REP (Borge Fagerli): activation set + mini-sets with 5-10s micro-rest ──
      // Research: Best for isolations/machines. Avoid heavy compounds (squats, deads).
      // Activation: 12-30 reps near failure. Mini-sets: 3-5 reps × 4-5 sets, 5-10s rest.
      // Progression: all mini-sets completed → +1 rep to activation next session.
      if(mid==="myo"){
        var picked=[];var myUsed={};
        // Prefer isolations for myo-reps (research: compounds unsuitable due to setup/safety)
        var myoIsos=seededShuffle(isos,rng);var myoComps=seededShuffle(comps,rng);
        for(var myi=0;myi<numExercises;myi++){
          var myx=myi<myoIsos.length?myoIsos[myi]:myoComps[myi%Math.max(1,myoComps.length)];
          if(myx&&!myUsed[myx.n]){picked.push(myx);myUsed[myx.n]=1;}
        }
        picked.forEach(function(ex){
          var isMyo=ex.myo;
          var isComp=ex.t==="C";
          // Compounds that can't do myo-reps get standard sets instead
          var forceStandard=isComp&&!isMyo;
          var myTime=exTime(isMyo?1:setsPerExercise,isMyo?15:10,isComp,firstComp&&isComp,isMyo?"myo":"straight");
          if(groupUsed+myTime>avail)return; // Budget guard
          var myNote=isMyo
            ?"MYO-REP: Activation set 12-30 reps to near failure. Rest 5-10 seconds (3-5 deep breaths). Mini-set: 3-5 reps. Repeat 4-5 mini-sets. STOP when you lose a rep vs previous mini-set."
            :forceStandard?"Standard sets — this compound isn't suited for myo-reps (safety/setup). Use for progressive overload."
            :"Standard sets (not myo-rep compatible)";
          exs.push({name:ex.n,muscle:muscle,tech:isMyo?"myo":"straight",sets:isMyo?1:setsPerExercise,reps:isMyo?"12-30 + 4-5×3-5":"8-12",time:myTime,mv:ex.mv,note:myNote});
          if(isComp)firstComp=false;used+=myTime;groupUsed+=myTime;
        });
        return;
      }

      // ── DC REST-PAUSE (Dante Trudel): 1 exercise per muscle, rest-pause + extreme stretch ──
      // Research: DC uses 3-way exercise rotation (A/B/C), 1 RP set per muscle, widowmaker for quads
      if(mid==="dc"){
        var dcPool=comps.length>0?comps:isos;
        // Rotate through 3 exercises across sessions (DC A/B/C rotation)
        var dcIdx=(off+Math.floor(genCount/3))%Math.max(1,dcPool.length);
        var dcEx=dcPool[dcIdx];
        if(dcEx){
          var isQuad=muscle==="quads";
          var rpTime=exTime(1,isQuad?20:8,true,firstComp,"restpause");
          if(groupUsed+rpTime>avail)return; // Budget guard
          if(isQuad){
            // DC Widowmaker: 20-rep breathing set for quads
            exs.push({name:dcEx.n,muscle:muscle,tech:"restpause",sets:1,reps:"20 rep widowmaker",time:rpTime,mv:dcEx.mv,note:"DC WIDOWMAKER: 1 set of 20 reps. Don't rack the weight. Breathe at the top between reps. Most brutal set of the session."});
          } else {
            exs.push({name:dcEx.n,muscle:muscle,tech:"restpause",sets:1,reps:"7-9 + RP + RP",time:rpTime,mv:dcEx.mv,note:"DC Rest-Pause: Set 1 to failure (7-9 reps), 10-15 deep breaths, set 2 to failure (2-4 reps), breathe, set 3 to failure (1-2 reps). Then 60-90s loaded stretch."});
          }
          firstComp=false;used+=rpTime;groupUsed+=rpTime;
        }
        return;
      }

      // ── DUP (Daily Undulating Periodization): vary rep ranges by day ──
      if(mid==="dup"){
        // Day type cycles: strength → hypertrophy → endurance across days
        var dupTypes=["strength","hypertrophy","endurance"];
        var dupType=dupTypes[di%dupTypes.length];
        var dupReps=dupType==="strength"?"4-6":dupType==="hypertrophy"?"8-12":"15-20";
        var dupSets=dupType==="strength"?4:dupType==="hypertrophy"?3:2;
        var dupRest=dupType==="strength"?"3 min":dupType==="hypertrophy"?"90s":"60s";
        var dupNote="DUP "+dupType.toUpperCase()+" DAY: "+dupReps+" reps, "+dupSets+" sets, "+dupRest+" rest. "+
          (dupType==="strength"?"Heavy — focus on max tension and controlled eccentrics.":
           dupType==="hypertrophy"?"Moderate — controlled tempo, feel the muscle working.":
           "Light — chase the pump, metabolic stress, minimal rest.");
        // Pick same exercises as straight sets but with DUP loading
        var dupPicked=[];var dupUsed={};
        for(var di2=0;di2<Math.min(numExercises,comps.length);di2++){
          var dci=(di2+off)%comps.length;
          if(!dupUsed[comps[dci].n]){dupPicked.push(comps[dci]);dupUsed[comps[dci].n]=1;}
        }
        var dupIsoOff=Math.floor(rng()*Math.max(1,isos.length));
        for(var dj=0;dupPicked.length<numExercises&&dj<isos.length;dj++){
          var dii=(dj+dupIsoOff)%isos.length;
          if(!dupUsed[isos[dii].n]){dupPicked.push(isos[dii]);dupUsed[isos[dii].n]=1;}
        }
        dupPicked.forEach(function(ex){
          var dTime=exTime(dupSets,parseInt(dupReps)||10,ex.t==="C",firstComp&&ex.t==="C","straight");
          if(groupUsed+dTime>avail)return; // Budget guard
          exs.push({name:ex.n,muscle:muscle,tech:"straight",sets:dupSets,reps:dupReps,time:dTime,mv:ex.mv,note:dupNote,rir:rir});
          if(ex.t==="C")firstComp=false;used+=dTime;groupUsed+=dTime;
        });
        return;
      }

      // ── STRAIGHT SETS / HYBRID (default) ──
      // FIX: sessionTarget divided AMONG exercises (not given to each)
      // Pick from shuffled pools using modular offset so rotation works across the full pool
      // Family grouping: prevent picking two exercises from the same family
      var picked=[];var usedNames={};var usedFamilies={};
      for(var i=0;i<numExercises&&picked.length<numExercises;i++){
        var ci=(i+off)%comps.length;
        if(ci<comps.length&&!usedNames[comps[ci].n]){
          var fam=getExFamily(comps[ci].n);
          if(!fam||!usedFamilies[fam]){
            picked.push(comps[ci]);usedNames[comps[ci].n]=1;
            if(fam)usedFamilies[fam]=1;
          }
        }
      }
      var isoOff=Math.floor(rng()*Math.max(1,isos.length));
      for(var j=0;picked.length<numExercises&&j<isos.length;j++){
        var ii=(j+isoOff)%isos.length;
        if(!usedNames[isos[ii].n]){
          var isoFam=getExFamily(isos[ii].n);
          if(!isoFam||!usedFamilies[isoFam]){
            picked.push(isos[ii]);usedNames[isos[ii].n]=1;
            if(isoFam)usedFamilies[isoFam]=1;
          }
        }
      }
      // Fallback: if family filtering was too restrictive, fill remaining slots ignoring family
      if(picked.length<numExercises){
        for(var fb=0;picked.length<numExercises&&fb<isos.length;fb++){
          var fbi=(fb+isoOff)%isos.length;
          if(!usedNames[isos[fbi].n]){picked.push(isos[fbi]);usedNames[isos[fbi].n]=1;}
        }
      }
      // Volume weighting: compounds get 60% of sets, isolations 40% (research: higher neuromuscular demand)
      var compCount=picked.filter(function(e){return e.t==="C";}).length;
      var isoCount=picked.length-compCount;
      var compSets=compCount>0?Math.max(2,Math.ceil(sessionTarget*0.6/compCount)):0;
      var isoSets=isoCount>0?Math.max(2,Math.ceil(sessionTarget*0.4/isoCount)):0;
      if(compCount===0)isoSets=setsPerExercise;if(isoCount===0)compSets=setsPerExercise;
      picked.forEach(function(ex){
        var tech="straight";
        if(mid==="hybrid")tech=(ex.t==="I"&&ex.myo)?"myo":"straight";
        var reps=tech==="myo"?"12-20 + 3-5x3-5":baseReps;
        var sets=tech==="myo"?1:(ex.t==="C"?compSets:isoSets);
        if(phase==="deload"){reps="8-10 easy";sets=2;tech="straight";}
        var isComp=ex.t==="C";var repsNum=parseInt(reps)||10;
        var eTime=exTime(sets,repsNum,isComp,firstComp&&isComp,tech);
        if(groupUsed+eTime>avail)return; // Budget guard: don't let one group steal another's time
        var note=phase==="deload"?"DELOAD: 50% weight, easy reps. Should feel refreshing.":"W"+wk+" / "+rir+" RIR / "+phase;
        exs.push({name:ex.n,muscle:muscle,tech:tech,sets:sets,reps:reps,time:eTime,mv:ex.mv,note:note,rir:rir});
        if(isComp)firstComp=false;used+=eTime;groupUsed+=eTime;
      });
    });

    // Add cardio if goal requires it — rotate with seed so it varies
    if(cl>0){
      var cardioPool=EX.cardio||[];
      if(cardioPool.length>0){
      var cardioRng=mulberry32(baseSeed+di*97+43);
      var cIdx=Math.floor(cardioRng()*cardioPool.length);
      if(cl>=3)cIdx=Math.min(Math.floor(cardioRng()*2),cardioPool.length-1); // Contest: pick from HIIT options
      var cEx=cardioPool[Math.min(cIdx,cardioPool.length-1)];
      var cTime=cEx.t==="H"?8:cEx.t==="R"?15:10;
      exs.push({name:cEx.n,muscle:"cardio",tech:cEx.t==="H"?"hiit":cEx.t==="R"?"recovery":"steady",sets:1,reps:"",time:cTime,mv:"cardio",note:cEx.t==="H"?"High-intensity intervals. All-out effort.":cEx.t==="R"?"Active recovery. Keep moving, stay loose.":"Moderate steady-state cardio."});
      } // end cardioPool.length>0
    }

    // ── TIER 5: CORRECTIVE (AthleanX: joint health, posture prehab) ──
    if(phase!=="deload"&&methodObj.tiers&&methodObj.tiers.corr){
      // Determine day type: push/pull/legs based on muscle groups
      var dayType="push";
      var hasPull=day.g.indexOf("back")>=0||day.g.indexOf("biceps")>=0;
      var hasLegs=day.g.indexOf("quads")>=0||day.g.indexOf("hams")>=0;
      var hasPush=day.g.indexOf("chest")>=0||day.g.indexOf("shoulders")>=0||day.g.indexOf("triceps")>=0;
      if(hasLegs&&!hasPush&&!hasPull)dayType="legs";
      else if(hasPull&&!hasPush)dayType="pull";
      else if(hasLegs)dayType="legs";
      var corrPool=CORRECTIVES[dayType]||(CORRECTIVES.push?CORRECTIVES.push:[]);
      var corrRng=mulberry32(baseSeed+di*331);
      if(!corrPool||corrPool.length===0)return;
      var corrPick=corrPool[Math.floor(corrRng()*corrPool.length)];
      exs.push({name:corrPick.n,muscle:"corrective",tech:"corrective",sets:corrPick.sets,reps:corrPick.reps,time:2,mv:corrPick.mv,note:"CORRECTIVE: "+corrPick.note,tier:"corrective"});
    }

    // ── TIER 6: CARRY or GRIT (alternating per session, based on method prefs) ──
    if(phase!=="deload"&&methodObj.tiers&&(methodObj.tiers.carry||methodObj.tiers.grit)){
      var wantCarry=methodObj.tiers.carry;
      var wantGrit=methodObj.tiers.grit;
      var useCarry=wantCarry&&wantGrit?((di+wk)%2===0):wantCarry;
      if(useCarry){
        var carryRng=mulberry32(baseSeed+di*443);
        var carryPick=CARRIES[Math.floor(carryRng()*CARRIES.length)];
        exs.push({name:carryPick.n,muscle:"carry",tech:"carry",sets:carryPick.sets,reps:carryPick.reps,time:carryPick.time,mv:carryPick.mv,note:"CARRY: "+carryPick.note,tier:"carry"});
      } else {
        var gritOptions=GRIT.filter(function(g){
          for(var gi=0;gi<g.for.length;gi++){if(day.g.indexOf(g.for[gi])>=0)return true;}return false;
        });
        if(gritOptions.length>0){
          var gritRng=mulberry32(baseSeed+di*571);
          var gritPick=gritOptions[Math.floor(gritRng()*gritOptions.length)];
          exs.push({name:gritPick.n,muscle:"grit",tech:"grit",sets:1,reps:"see desc",time:4,mv:gritPick.mv,note:"GRIT: "+gritPick.desc,tier:"grit"});
        }
      }
    }

    // ═══ SMART EXERCISE ORDERING ═══
    // Order: Primers → Compounds (heaviest first) → Isolations → Correctives → Carries/Grit → Cardio
    var tierOrder={"primer":0,"strength":1,"straight":2,"preexhaust":2,"restpause":2,"mechanical":3,"myo":4,"corrective":5,"carry":6,"grit":7,"hiit":8,"recovery":9,"steady":9};
    exs.sort(function(a,b){
      var ta=tierOrder[a.tech]!==undefined?tierOrder[a.tech]:(a.tier?tierOrder[a.tier]:3);
      var tb=tierOrder[b.tech]!==undefined?tierOrder[b.tech]:(b.tier?tierOrder[b.tier]:3);
      if(ta!==tb)return ta-tb;
      // Within same tier, compounds before isolations
      var typeA=a.name&&a.name.indexOf("DB ")===0?0:1;
      var typeB=b.name&&b.name.indexOf("DB ")===0?0:1;
      return typeA-typeB;
    });

    // ═══ ATHLEANX EXPRESS AUTO-COMPRESS ═══
    // Before cutting exercises, try compressing (superset pairing, reduced rest, fewer sets)
    var tot=exs.reduce(function(a,e){return a+e.time;},0);
    if(tot>mins){
      exs=expressCompress(exs,mins);
      tot=exs.reduce(function(a,e){return a+e.time;},0);
    }
    // If STILL over after compression, trim hypertrophy exercises BALANCED across muscle groups
    while(tot>mins&&exs.length>3){
      // Count trimmable exercises per muscle group
      var muscleCounts={};
      var trimmable=[];
      for(var ri=exs.length-1;ri>=0;ri--){
        if(exs[ri].tier!=="primer"&&exs[ri].tier!=="grit"&&exs[ri].tier!=="carry"&&exs[ri].tier!=="corrective"&&exs[ri].tier!=="strength"&&exs[ri].muscle!=="cardio"){
          trimmable.push(ri);
          var mg=exs[ri].muscle||"other";
          muscleCounts[mg]=(muscleCounts[mg]||0)+1;
        }
      }
      if(trimmable.length===0)break;
      // Find the muscle group with the MOST trimmable exercises and remove from there
      var maxMuscle=null;var maxCount=0;
      for(var mk in muscleCounts){if(muscleCounts[mk]>maxCount){maxCount=muscleCounts[mk];maxMuscle=mk;}}
      // Find the last trimmable exercise from that muscle group
      var removeIdx=-1;
      for(var ti=0;ti<trimmable.length;ti++){
        if(exs[trimmable[ti]].muscle===maxMuscle){removeIdx=trimmable[ti];break;}
      }
      if(removeIdx<0)removeIdx=trimmable[0]; // fallback
      exs.splice(removeIdx,1);
      tot=exs.reduce(function(a,e){return a+e.time;},0);
    }
    // Apply learned time correction factor
    var tf=getTimeFactor();
    var correctedEst=Math.round(tot*tf);
    sessions.push({label:day.n,exercises:exs,est:tot,correctedEst:correctedEst});
  });
  return sessions;
}

  function getStallLevel(exName) {

    // Compare best set from each session

    var prevBest = {w: 0, r: 0};

    prev.sets.forEach(function(s) { if (s.w > prevBest.w || (s.w === prevBest.w && s.r > prevBest.r)) { prevBest = s; } });
    // Stalled = same or less weight, same or fewer reps
    var stall1 = (lastBest.w <= prevBest.w && lastBest.r <= prevBest.r);
    if (!stall1) return 0;
    if (hist.length >= 3) {
      var prev2 = hist[2];
      if (prev2.sets && prev2.sets.length) {
        var prev2Best = {w: 0, r: 0};
        prev2.sets.forEach(function(s) { if (s.w > prev2Best.w || (s.w === prev2Best.w && s.r > prev2Best.r)) { prev2Best = s; } });

  // ═══ GET STALL-BUSTER STATUS ═══
  // Smart stall detection at ANY weight. Looks at TWO signals:
  //   1. Same weight for N sessions (original check)
  //   2. Best-set volume (w×r) hasn't improved for N sessions (catches rep stalls too)
  // Whichever gives the HIGHER stall count wins. This means the ladder triggers
  // whether you're at 25lb or 200lb — whenever progress truly stalls.
  function getStallStep(exName) {
    var hist = exHist[exName];
    if (!hist || hist.length < 2) return -1;
    // Helper: best set volume from a session
    function bestVol(entry) {
      var bv = 0; var bw = 0;
      if (entry.sets) entry.sets.forEach(function(s) {
        var v = (s.w || 0) * (s.r || 0);
        if (v > bv) { bv = v; bw = s.w; }
      });
      return { vol: bv, w: bw };
    }
    var current = bestVol(hist[0]);
    if (current.vol === 0) return -1;

    // Signal 1: Consecutive sessions at same top weight
    var sessionsAtWeight = 1;
    for (var h = 1; h < hist.length; h++) {
      var hw = bestVol(hist[h]).w;
      if (hw === current.w) sessionsAtWeight++;
      else break;
    }

    // Signal 2: Consecutive sessions where best-set volume hasn't improved
    // (catches cases where weight AND reps are both stuck, even if weight varies slightly)
    var sessionsNoProgress = 1;
    var peakVol = current.vol;
    for (var h2 = 1; h2 < hist.length; h2++) {
      var hv = bestVol(hist[h2]).vol;
      if (hv >= peakVol) {
        // This older session was as good or better — no progress since then
        sessionsNoProgress++;
        if (hv > peakVol) peakVol = hv;
      } else break;
    }

    // Use the HIGHER stall count (whichever signal is more alarming)
    var stallSessions = Math.max(sessionsAtWeight, sessionsNoProgress);
    if (stallSessions < 2) return -1;

    // Find the highest ladder step that applies
    var bestIdx = -1;
    for (var i = 0; i < STALL_LADDER.length; i++) {
      if (stallSessions >= STALL_LADDER[i].minSessions) bestIdx = i;

        return {w: fallback.w, r: fallback.r, isExact: false};

    var prList = [];

    day.exercises.forEach(function(ex, ei) {
      var k = aDay + "-" + ei;
      var entry = log[k];
      if (!entry || !entry.sets) return;
      var sets = [];
      entry.sets.forEach(function(s) { if (s && s.w && s.r) { var sd={w: s.w, r: s.r}; if(s.rir!==undefined&&s.rir!==null) sd.rir=s.rir; sets.push(sd); }});
      if (sets.length === 0) return;

      exData.push({name: ex.name, muscle: ex.muscle, tech: ex.tech, sets: sets});

      // Update exercise history (keep last 5 sessions)
      var h = (newHist[ex.name] || []).slice();
      h.unshift({sets: sets, date: ds});
      if (h.length > 5) h = h.slice(0, 5);
      newHist[ex.name] = h;

      // Check for PRs (weight PR or volume PR)
      var topW = 0;
      var topR = 0;
      var totVol = 0;
      sets.forEach(function(s) {
        if (s.w > topW || (s.w === topW && s.r > topR)) { topW = s.w; topR = s.r; }
        totVol += s.w * s.r;
      });
      // Estimated 1RM via Epley formula: w * (1 + r/30)
      var est1RM = topR > 0 ? Math.round(topW * (1 + topR / 30)) : topW;
      var prevPR = newPRsMap[ex.name];
      var isNewPR = false;
      var prType = [];
      if (!prevPR) {
        isNewPR = true; prType.push("NEW");
      } else {
        if (topW > prevPR.w) { isNewPR = true; prType.push("WEIGHT"); }
        else if (topW === prevPR.w && topR > prevPR.r) { isNewPR = true; prType.push("REPS"); }
        if (prevPR.vol && totVol > prevPR.vol) { isNewPR = true; prType.push("VOLUME"); }
        if (prevPR.e1rm && est1RM > prevPR.e1rm) { isNewPR = true; prType.push("1RM"); }
      }
      if (isNewPR) {
        newPRsMap[ex.name] = {w: topW, r: topR, vol: totVol, e1rm: est1RM, date: ds};
        prList.push({name: ex.name, w: topW, r: topR, e1rm: est1RM, type: prType.join("+")});
      }
    });

    // ═══ REP RANGE RESPONSE TRACKING ═══
    // For each exercise, classify rep range and track progression rate per muscle
    var newRRT=Object.assign({},repRangeTrack);
    day.exercises.forEach(function(ex,ei){
      var k2=aDay+"-"+ei;var entry=log[k2];
      if(!entry||!entry.sets||ex.muscle==="cardio"||ex.muscle==="grit"||ex.tier==="primer")return;
      var avgReps=0;var cnt2=0;
      entry.sets.forEach(function(s){if(s&&s.r){avgReps+=s.r;cnt2++;}});
      if(cnt2===0)return;avgReps=Math.round(avgReps/cnt2);
      var bucket=avgReps<=6?"low":avgReps<=12?"mid":"high"; // low=1-6, mid=7-12, high=13+
      // Calculate progression rate vs last session
      var prevHist=exHist[ex.name];
      if(prevHist&&prevHist.length>0&&prevHist[0].sets){
        var prevVol=0;prevHist[0].sets.forEach(function(s){prevVol+=s.w*s.r;});
        var curVol=0;entry.sets.forEach(function(s){if(s&&s.w&&s.r)curVol+=s.w*s.r;});
        if(prevVol>0){
          var progRate=(curVol-prevVol)/prevVol; // % change
          if(!newRRT[ex.muscle])newRRT[ex.muscle]={low:[],mid:[],high:[]};
          var arr=newRRT[ex.muscle][bucket];
          arr.push(progRate);
          if(arr.length>10)newRRT[ex.muscle][bucket]=arr.slice(-10); // keep last 10
        }
      }
    });
    setRepRangeTrack(newRRT);
    sSet("forge_rrt",newRRT);

    setExHist(newHist);
    setPRs(newPRsMap);
    setNewPRs(prList);
    sSet("forge_exh", newHist);
    sSet("forge_prs", newPRsMap);

    // Update session index
    var newIdx = sessIdx.slice();
    newIdx.push({date: ds, label: day.label, goal: goal, split: split, method: method, readiness: readMod, perf: fPerf});
    setSessIdx(newIdx);
    sSet("forge_idx", newIdx);

    // Save full session data
    sSet("forge_s_" + ds + "_" + aDay, {
      label: day.label,
      exercises: exData,
      readiness: readiness,
      readMod: readMod,
      feedback: {perf: fPerf, recovery: fRecovery, disruption: fDisrupt, joint: fJoint, vm: vm},
      week: weekNum
    });

    // Add to completedDays
    var newCompletedDays = completedDays.slice();
    var found = false;
    for (var cd = 0; cd < newCompletedDays.length; cd++) {
      if (newCompletedDays[cd].weekNum === weekNum && newCompletedDays[cd].dayIdx === aDay) {
        found = true;
        break;
      }
    }
    if (!found) {
      newCompletedDays.push({weekNum: weekNum, dayIdx: aDay, date: ds});
      setCompletedDays(newCompletedDays);
      sSet("forge_completedDays", newCompletedDays);
    }

    // Auto-advance week if all days are done
    var allDone = true;
    for (var ad = 0; ad < program.length; ad++) {
      var isDone = false;
      for (var cd2 = 0; cd2 < newCompletedDays.length; cd2++) {
        if (newCompletedDays[cd2].weekNum === weekNum && newCompletedDays[cd2].dayIdx === ad) {
          isDone = true;
          break;
        }
      }
      if (!isDone) { allDone = false; break; }
    }
    if (allDone && weekNum < mesoLen) {
      setWeekNum(weekNum + 1);
      sSet("forge_config", {goal: goal, split: split, method: method, mins: mins, mesoLen: mesoLen, weekNum: weekNum + 1, numDays: numDays, genCount: genCount, presetCd: presetCd, specMuscles: specMuscles, presetPick: presetPick});
    }

    setSessionSaved(true);
  }

  // ═══ SESSION ROLLBACK (undo last saved session) ═══
  function rollbackLastSession(){
    if(sessIdx.length===0)return;
    var lastSess=sessIdx[sessIdx.length-1];
    if(!confirm("Undo your last saved session ("+lastSess.label+" on "+lastSess.date+")? This will remove the session from your history."))return;
    // Remove from session index
    var newIdx=sessIdx.slice(0,-1);
    setSessIdx(newIdx);
    sSet("forge_idx",newIdx);
    // Remove from completedDays
    var newCD=completedDays.filter(function(cd){return cd.date!==lastSess.date;});
    setCompletedDays(newCD);
    sSet("forge_completedDays",newCD);
    // Note: we don't remove exercise history entries since they're harder to precisely undo
    // and the stall detection/progression logic benefits from keeping the data
    alert("Session undone. Exercise history data is kept for progression tracking.");
  }
