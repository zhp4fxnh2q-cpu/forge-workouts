  // ═══ EXCEL RESTORE: Import data from .xlsx backup ═══
  function importFromExcel(file){
    if(typeof XLSX==="undefined"){alert("SheetJS library not loaded.");return;}
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var wb=XLSX.read(e.target.result,{type:"array"});
        var imported={sessions:false,history:false,prs:false,config:false,completed:false,rrt:false};

        // ── Restore Session Log ──
        if(wb.SheetNames.indexOf("Sessions")>=0){
          var sessData=XLSX.utils.sheet_to_json(wb.Sheets["Sessions"]);
          if(sessData.length>0){
            var newIdx=sessData.map(function(r){
              return{date:r.Date||"",label:r.Workout||"",goal:r.Goal||"",split:r.Split||"",method:r.Method||"",
                readiness:r.Readiness?parseFloat(r.Readiness)/100:1,
                perf:r.Performance==="Worse"?0:r.Performance==="Better"?2:1};
            });
            setSessIdx(newIdx);sSet("forge_idx",newIdx);
            imported.sessions=true;
          }
        }

        // ── Restore Exercise History ──
        if(wb.SheetNames.indexOf("Exercise History")>=0){
          var histData=XLSX.utils.sheet_to_json(wb.Sheets["Exercise History"]);
          if(histData.length>0){
            var newHist={};
            histData.forEach(function(r){
              var name=r.Exercise;if(!name)return;
              var date=r.Date||"";
              if(!newHist[name])newHist[name]=[];
              // Group by date
              var existing=null;
              for(var hi=0;hi<newHist[name].length;hi++){if(newHist[name][hi].date===date){existing=newHist[name][hi];break;}}
              if(!existing){existing={sets:[],date:date};newHist[name].push(existing);}
              var setObj={w:parseFloat(r["Weight (lb)"])||0,r:parseInt(r.Reps)||0};
              if(r.RIR!==""&&r.RIR!==undefined&&r.RIR!==null)setObj.rir=parseInt(r.RIR);
              existing.sets.push(setObj);
            });
            // Keep only last 5 sessions per exercise (sorted newest first)
            Object.keys(newHist).forEach(function(name){
              newHist[name].sort(function(a,b){return(b.date||"").localeCompare(a.date||"");});
              if(newHist[name].length>5)newHist[name]=newHist[name].slice(0,5);
            });
            setExHist(newHist);sSet("forge_exh",newHist);
            imported.history=true;
          }
        }

        // ── Restore Personal Records ──
        if(wb.SheetNames.indexOf("Personal Records")>=0){
          var prData=XLSX.utils.sheet_to_json(wb.Sheets["Personal Records"]);
          if(prData.length>0){
            var newPRs={};
            prData.forEach(function(r){
              if(!r.Exercise)return;
              newPRs[r.Exercise]={w:parseFloat(r["Best Weight"])||0,r:parseInt(r["Best Reps"])||0,
                vol:parseFloat(r["Total Volume"])||0,e1rm:parseFloat(r["Est 1RM"])||0,date:r.Date||""};
            });
            setPRs(newPRs);sSet("forge_prs",newPRs);
            imported.prs=true;
          }
        }

        // ── Restore Config ──
        if(wb.SheetNames.indexOf("Config")>=0){
          var cfgData=XLSX.utils.sheet_to_json(wb.Sheets["Config"]);
          var cfg={};
          cfgData.forEach(function(r){cfg[r.Setting]=r.Value;});
          if(cfg.Goal){setGoal(cfg.Goal);}
          if(cfg.Split){setSplit(cfg.Split);}
          if(cfg.Method){setMethod(cfg.Method);}
          if(cfg["Session Minutes"]){setMins(parseInt(cfg["Session Minutes"])||45);}
          if(cfg["Meso Length"]){setMesoLen(parseInt(cfg["Meso Length"])||6);}
          if(cfg["Current Week"]){setWeekNum(parseInt(cfg["Current Week"])||1);}
          if(cfg["Generation Count"]){setGenCount(parseInt(cfg["Generation Count"])||0);}
          if(cfg.Preset){setPresetPick(cfg.Preset);}
          if(cfg["Banned Exercises"]){
            var b=cfg["Banned Exercises"].split(",").map(function(s){return s.trim();}).filter(Boolean);
            setBanned(b);sSet("forge_banned",b);
          }
          if(cfg["Meso Swaps"]){
            try{var sw=JSON.parse(cfg["Meso Swaps"]);setMesoSwaps(sw);sSet("forge_swaps",sw);}catch(e){}
          }
          sSet("forge_config",{goal:cfg.Goal,split:cfg.Split,method:cfg.Method,mins:parseInt(cfg["Session Minutes"])||45,
            mesoLen:parseInt(cfg["Meso Length"])||6,weekNum:parseInt(cfg["Current Week"])||1,
            genCount:parseInt(cfg["Generation Count"])||0,preset:cfg.Preset||null});
          imported.config=true;
        }

        // ── Restore Completed Days ──
        if(wb.SheetNames.indexOf("Completed Days")>=0){
          var cdData=XLSX.utils.sheet_to_json(wb.Sheets["Completed Days"]);
          if(cdData.length>0){
            var newCD=cdData.map(function(r){
              return{date:r.Date||"",wk:parseInt(r.Week)||1,day:parseInt(r["Day Index"])||0,label:r.Label||""};
            });
            setCompletedDays(newCD);sSet("forge_completedDays",newCD);
            imported.completed=true;
          }
        }

        // ── Restore Rep Range Data ──
        if(wb.SheetNames.indexOf("Rep Range Data")>=0){
          var rrtData=XLSX.utils.sheet_to_json(wb.Sheets["Rep Range Data"]);
          if(rrtData.length>0){
            var newRRT={};
            rrtData.forEach(function(r){
              var m=r.Muscle;var bucket=r["Rep Range"];var rates=r["Progression Rates (last 10)"];
              if(!m||!bucket||!rates)return;
              if(!newRRT[m])newRRT[m]={low:[],mid:[],high:[]};
              newRRT[m][bucket]=rates.split(",").map(function(s){return parseFloat(s)/10;}).filter(function(n){return!isNaN(n);});
            });
            setRepRangeTrack(newRRT);sSet("forge_rrt",newRRT);
            imported.rrt=true;
          }
        }

        var summary=[];
        if(imported.sessions)summary.push("Sessions ("+sessIdx.length+")");
        if(imported.history)summary.push("Exercise History");
        if(imported.prs)summary.push("Personal Records");
        if(imported.config)summary.push("Program Config");
        if(imported.completed)summary.push("Completed Days");
        if(imported.rrt)summary.push("Rep Range Data");
        alert("Backup restored!\n\nImported: "+summary.join(", ")+"\n\nRefresh the page to see all changes.");
      }catch(err){
        alert("Error reading backup file: "+err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  }

  // ═══ SMART REST DAY SYSTEM ═══
  // Generates a 7-day week schedule with training days and rest days
  // Rest days are placed optimally based on the split to maximize recovery
  function getWeekSchedule(){
    if(!program||program.length===0)return[];
    var numTrain=program.length;
    var numRest=7-numTrain;
    var sched=[];
    // Distribute rest days evenly between training days
    // e.g., 3 train = T R T R T R R, 4 train = T T R T T R R, 5 train = T T R T T T R, 6 train = T T T R T T T
    if(numTrain<=3){
      // Alternate: train, rest, train, rest...
      var ti=0;
      for(var d=0;d<7;d++){
        if(ti<numTrain&&(d%2===0||ti>=numTrain)){sched.push({type:"train",dayIdx:ti,label:program[ti].label});ti++;}
        else{sched.push({type:"rest",slot:d,label:"Rest Day"});}
      }
      // Fix: ensure exactly numTrain training days
      while(sched.filter(function(s){return s.type==="train";}).length<numTrain){
        for(var ri=sched.length-1;ri>=0;ri--){
          if(sched[ri].type==="rest"){sched[ri]={type:"train",dayIdx:ti,label:program[ti].label};ti++;break;}
        }
      }
    }else if(numTrain===4){
      // T T R T T R R
      sched=[{type:"train",dayIdx:0},{type:"train",dayIdx:1},{type:"rest",slot:2},{type:"train",dayIdx:2},{type:"train",dayIdx:3},{type:"rest",slot:5},{type:"rest",slot:6}];
    }else if(numTrain===5){
      // T T R T T T R
      sched=[{type:"train",dayIdx:0},{type:"train",dayIdx:1},{type:"rest",slot:2},{type:"train",dayIdx:2},{type:"train",dayIdx:3},{type:"train",dayIdx:4},{type:"rest",slot:6}];
    }else{
      // 6 days: T T T R T T T
      sched=[{type:"train",dayIdx:0},{type:"train",dayIdx:1},{type:"train",dayIdx:2},{type:"rest",slot:3},{type:"train",dayIdx:3},{type:"train",dayIdx:4},{type:"train",dayIdx:5}];
    }
    // Add labels for training days
    for(var si=0;si<sched.length;si++){
      if(sched[si].type==="train"&&program[sched[si].dayIdx]){
        sched[si].label=program[sched[si].dayIdx].label;
      }
      if(sched[si].type==="rest")sched[si].label="Rest";
    }
    return sched;
  }

  function isRestDayChecked(weekNum_,slot){
    for(var i=0;i<restDaysChecked.length;i++){
      if(restDaysChecked[i].wk===weekNum_&&restDaysChecked[i].slot===slot)return true;
    }
    return false;
  }

  function toggleRestDay(weekNum_,slot){
    var exists=false;
    var newRD=restDaysChecked.filter(function(rd){
      if(rd.wk===weekNum_&&rd.slot===slot){exists=true;return false;}
      return true;
    });
    if(!exists)newRD.push({wk:weekNum_,slot:slot,date:dateStr()});
    setRestDaysChecked(newRD);
    sSet("forge_restdays",newRD);
  }

  // Smart rest recommendation based on recent data signals
  function getRestRecommendation(){
    var signals=[];var score=0;
    // 1. Check recent readiness scores
    var recentSess=sessIdx.slice(-3);
    if(recentSess.length>=2){
      var lowReadiness=recentSess.filter(function(s){return s.readiness&&s.readiness<0.75;}).length;
      if(lowReadiness>=2){signals.push("Low readiness in "+lowReadiness+" of last "+recentSess.length+" sessions");score+=2;}
    }
    // 2. Check performance trend
    if(recentSess.length>=2){
      var declining=recentSess.filter(function(s){return s.perf===0;}).length;
      if(declining>=2){signals.push("Performance declining ("+declining+" sessions worse)");score+=2;}
    }
    // 3. Check workout frequency (too many days in a row)
    if(recentSess.length>=3){
      var dates=recentSess.map(function(s){return new Date(s.date).getTime();}).sort(function(a,b){return b-a;});
      var consecutive=1;
      for(var di=0;di<dates.length-1;di++){
        var diff=Math.abs(dates[di]-dates[di+1])/(1000*60*60*24);
        if(diff<=1.5)consecutive++;else break;
      }
      if(consecutive>=3){signals.push(consecutive+" training days in a row without rest");score+=1;}
    }
    // 4. Check last session joint/disruption feedback
    if(recentSess.length>0){
      var last=recentSess[recentSess.length-1];
      // Check last session's saved feedback for systemic fatigue
      if(last.readiness&&last.readiness<0.6){signals.push("Last session readiness was very low");score+=1;}
    }
    // 5. Check if we're in late meso (higher fatigue accumulation)
    if(weekNum>=mesoLen-1&&mesoLen>3){signals.push("Late in mesocycle — fatigue is accumulated");score+=1;}

    // 6. Check rest day compliance — if user isn't taking rest days when scheduled
    var sched=getWeekSchedule();
    var restSlots=sched.filter(function(s){return s.type==="rest";});
    var checkedRest=restSlots.filter(function(s){return isRestDayChecked(weekNum,s.slot);}).length;
    var missedRest=restSlots.length-checkedRest;
    if(missedRest>=2&&completedDays.filter(function(c){return c.wk===weekNum;}).length>=2){
      signals.push("Skipping scheduled rest days ("+missedRest+" missed this week)");score+=2;
    }
    if(missedRest>=1&&recentSess.length>=2&&recentSess.filter(function(s){return s.perf===0;}).length>=1){
      signals.push("Not resting + declining performance — recovery deficit likely");score+=1;
    }

    if(score>=3)return{level:"strong",msg:"Your body is sending recovery signals. A rest day would help you come back stronger.",signals:signals};
    if(score>=2)return{level:"mild",msg:"You might benefit from a rest day. Listen to your body.",signals:signals};
    return null;
  }

  // Protocol feasibility: which methods can fit in given time
  function getViableMethods(targetMins,numGroups){
    // Methods that are time-efficient enough for short sessions
    // sv = time savings %; higher sv = better for short sessions
    var viable=METHODS.filter(function(m){
      var effectiveTime=targetMins*(1-m.sv/100);
      var minNeeded=numGroups*5; // absolute minimum: 5 min per muscle group
      return effectiveTime>=minNeeded||targetMins>=40;
    });
    return viable;
  }

  function generateProg(){
    if(!goal||!split||!method)return;

    // Check if selected method fits the time budget
    var splitObjCheck=SPLITS.find(function(s){return s.id===split;});
    if(splitObjCheck){
      var maxGroups=Math.max.apply(null,splitObjCheck.layout.map(function(d){return d.g.length;}));
      var methodCheck=METHODS.find(function(m){return m.id===method;});
      if(methodCheck){
        var effectiveTime=mins*(1-methodCheck.sv/100);
        if(effectiveTime<maxGroups*5){
          var viable=getViableMethods(mins,maxGroups).filter(function(m){return m.id!==method;});
          if(viable.length>0){
            setMethodOverride({original:method,originalName:methodCheck.n,alternatives:viable,maxGroups:maxGroups,mins:mins});
            return; // Stop — show override popup, let user choose
          }
        }
      }
    }

    var newGenCount=genCount+1;
    setGenCount(newGenCount);
    // Derive equipment filter from selected preset (xero=bw, elastx=band, jacked=db, etc.)
    var eqF=null;
    if(presetPick){var pObj=PRESETS.find(function(x){return x.id===presetPick;});if(pObj&&pObj.equip)eqF=pObj.equip;}
    var newProg=buildProgram(splitObj,methodObj,goalObj,mins,weekNum,mesoLen,null,exHist,readMod,newGenCount,banned,eqF);
    // Apply persistent meso swaps
    if(mesoSwaps&&Object.keys(mesoSwaps).length>0){
      for(var sd=0;sd<newProg.length;sd++){
        for(var se=0;se<newProg[sd].exercises.length;se++){
          var swapTo=mesoSwaps[newProg[sd].exercises[se].name];
          if(swapTo){
            var swapEx=null;var pool=EX[newProg[sd].exercises[se].muscle]||[];
            for(var sp=0;sp<pool.length;sp++){if(pool[sp].n===swapTo){swapEx=pool[sp];break;}}
            if(swapEx) newProg[sd].exercises[se]=Object.assign({},newProg[sd].exercises[se],{name:swapEx.n,mv:swapEx.mv});
          }
        }
      }
    }
    setProgram(newProg);
    // Reset to week 1 / day 0 for fresh programs
    setWeekNum(1);setADay(0);
    setCompletedDays([]);sSet("forge_completedDays",[]);
    setRestDaysChecked([]);sSet("forge_restdays",[]);
    sSet("forge_program",newProg);
    sSet("forge_config",{goal:goal,split:split,method:method,mins:mins,mesoLen:mesoLen,weekNum:1,numDays:numDays,genCount:newGenCount,presetCd:presetCd,specMuscles:specMuscles});
  }

  // ═══ COACH INSIGHTS (post-session analysis) ═══
  function getCoachInsights(){
    var insights=[];
    // 1. Stall count per muscle
    var stallCount={};var muscles=Object.keys(EX);
    muscles.forEach(function(mg){
      if(mg==="cardio")return;
      var pool=EX[mg]||[];
      pool.forEach(function(ex){
        var st=detectStall(exHist[ex.n]||[]);
        if(st>=2){if(!stallCount[mg])stallCount[mg]=0;stallCount[mg]++;}
      });
    });
    var stallMuscles=Object.keys(stallCount);
    if(stallMuscles.length>0){
      insights.push({type:"warning",color:C.orn,title:"STALLED MUSCLES",text:stallMuscles.map(function(m){return m+" ("+stallCount[m]+" exercises)";}).join(", ")+". Consider rotating exercises or changing technique."});
    }
    // 2. Session frequency
    if(sessIdx.length>=4){
      var recent=sessIdx.slice(-4);
      var d1=new Date(recent[0].date);var d2=new Date(recent[recent.length-1].date);
      var daySpan=Math.max(1,Math.round((d2-d1)/(1000*60*60*24)));
      var freq=Math.round(recent.length/daySpan*7*10)/10;
      if(freq<2.5)insights.push({type:"info",color:C.blu,title:"LOW FREQUENCY",text:"Training "+freq+"x/week. Most research shows 2x/muscle/week optimal. Consider adding a session."});
      else if(freq>5.5)insights.push({type:"info",color:C.orn,title:"HIGH FREQUENCY",text:"Training "+freq+"x/week. Ensure adequate recovery between sessions."});
    }
    // 3. Mesocycle phase
    var phase=getMesoPhase(weekNum,mesoLen);
    if(phase==="peak")insights.push({type:"info",color:C.pur,title:"PEAK WEEK",text:"Final week of mesocycle. Push hard, then deload next week."});
    if(weekNum>mesoLen)insights.push({type:"warning",color:C.red,title:"DELOAD OVERDUE",text:"Week "+weekNum+" of a "+mesoLen+"-week meso. Time to deload and start fresh."});
    // 4. Volume check
    var overMRV=[];
    Object.keys(VOL_LM).forEach(function(m){
      var vm2=goalObj.vol[m]||1;
      var weeklyTarget=calcWeekVol(m,weekNum,mesoLen,vm2,0,null);
      if(weeklyTarget>=VOL_LM[m].mrv)overMRV.push(m);
    });
    if(overMRV.length>=2)insights.push({type:"warning",color:C.red,title:"VOLUME WARNING",text:overMRV.join(", ")+" approaching MRV. Watch for systemic fatigue."});
    // 5. Readiness trend analysis
    if(sessIdx.length>=3){
      var recentSess=sessIdx.slice(-5);
      var lowReadiness=0;
      recentSess.forEach(function(s){if(s.readiness&&s.readiness<0.7)lowReadiness++;});
      if(lowReadiness>=3)insights.push({type:"warning",color:C.orn,title:"READINESS TREND: LOW",text:"Low readiness in "+lowReadiness+" of last "+recentSess.length+" sessions. Check sleep, stress, and nutrition. Consider a deload or rest day."});
      // Detect oscillating readiness (high-low-high pattern = external stressor, not fatigue)
      if(recentSess.length>=4){
        var oscillating=0;
        for(var ri=1;ri<recentSess.length-1;ri++){
          var prev=recentSess[ri-1].readiness||0.8;var cur=recentSess[ri].readiness||0.8;var next=recentSess[ri+1].readiness||0.8;
          if((cur<0.7&&prev>0.8&&next>0.8)||(cur>0.9&&prev<0.7&&next<0.7))oscillating++;
        }
        if(oscillating>=2)insights.push({type:"info",color:C.blu,title:"READINESS PATTERN",text:"Your readiness oscillates significantly. This suggests external stressors (work, life events) rather than training fatigue. On low days, reduce volume but maintain frequency."});
      }
    }
    // 6. Feedback-volume auto-adjustment loop
    if(sessIdx.length>=3){
      var recentPerf=sessIdx.slice(-3);
      var decliningCount=0;
      recentPerf.forEach(function(s){if(s.perf!==undefined&&s.perf<=0)decliningCount++;});
      if(decliningCount>=3){
        insights.push({type:"warning",color:C.red,title:"PERFORMANCE DECLINING",text:"Performance has declined for 3+ consecutive sessions. FORGE is auto-reducing volume targets by ~10% until performance recovers. This is proactive fatigue management."});
      } else if(decliningCount>=2){
        insights.push({type:"info",color:C.orn,title:"PERFORMANCE DIP",text:"2 of your last 3 sessions showed declining performance. If this continues, FORGE will adjust volume down. Focus on sleep and nutrition."});
      }
    }
    // 7. Muscle-specific deload suggestions
    var musclesAtCeiling=[];
    Object.keys(VOL_LM).forEach(function(m){
      var vm2=goalObj.vol[m]||1;
      var target=calcWeekVol(m,weekNum,mesoLen,vm2,0,null);
      if(target>=VOL_LM[m].mrv)musclesAtCeiling.push(m);
    });
    if(musclesAtCeiling.length>0&&musclesAtCeiling.length<3){
      // Only some muscles at MRV — suggest muscle-specific deload instead of full deload
      insights.push({type:"info",color:C.pur,title:"TARGETED DELOAD",text:musclesAtCeiling.join(", ")+" at MRV ceiling. You can reduce volume for just these muscles (drop 1-2 sets) while continuing normal training for others. Full deload not yet needed."});
    }
    return insights;
  }

  // ═══ VOLUME STATUS (weekly sets per muscle vs MEV/MAV/MRV) ═══
  function getVolumeStatus(){
    var status=[];
    Object.keys(VOL_LM).forEach(function(m){
      var lm=VOL_LM[m];
      var vm2=goalObj.vol[m]||1;
      var target=calcWeekVol(m,weekNum,mesoLen,vm2,0,null);
      var pct=Math.round((target-lm.mev)/(lm.mrv-lm.mev)*100);
      status.push({muscle:m,sets:target,mev:lm.mev,mav:lm.mav,mrv:lm.mrv,pct:Math.min(100,Math.max(0,pct))});
    });
    return status;
  }

  // ═══ EXERCISE SWAP SCOPE ═══
  function doSwap(dayIdx, exIdx, newEx, scope) {
    // scope: "workout" = just this workout, "meso" = rest of mesocycle
    setProgram(function(prev) {
      var np = JSON.parse(JSON.stringify(prev));
      var old = np[dayIdx].exercises[exIdx];
      var replacement = {name: newEx.n || newEx.name, muscle: old.muscle, tech: old.tech, sets: old.sets, reps: old.reps, time: Math.round((newEx.m || old.time) * (1 - (methodObj ? methodObj.sv / 100 : 0))), mv: newEx.mv || old.mv};
      np[dayIdx].exercises[exIdx] = replacement;
      if (scope === "meso") {
        // Also swap in all other days that have the same exercise
        var oldName = old.name;
        for (var d = 0; d < np.length; d++) {
          for (var e = 0; e < np[d].exercises.length; e++) {
            if (d === dayIdx && e === exIdx) continue;
            if (np[d].exercises[e].name === oldName) {
              np[d].exercises[e] = Object.assign({}, np[d].exercises[e], {name: replacement.name, mv: replacement.mv});
            }
          }
        }
      }
      return np;
    });
    if (scope === "meso") {
      // Store swap so it persists when program regenerates
      var newSwaps = Object.assign({}, mesoSwaps);
      var oldEx = program[dayIdx].exercises[exIdx];
      newSwaps[oldEx.name] = newEx.n || newEx.name;
      setMesoSwaps(newSwaps);
      sSet("forge_swaps", newSwaps);
    }
    setEditPick(null);
    setSwapPending(null);
  }

  // ═══ RENDER LAST SESSION HINT + STALL BADGE ═══
  function renderExHint(exName, muscle) {
    var last = getLastData(exName);
    var stall = getStallLevel(exName);
    if (!last && stall === 0) return null;
    var parts = [];
    if (last && last.sets && last.sets.length > 0) {
      var summary = last.sets.map(function(s) { return s.w + "x" + s.r; }).join(", ");
      parts.push(<span key="last" style={{fontSize:10,color:C.dim}}>{"Last: " + summary}</span>);
      if (last.date) {
        parts.push(<span key="date" style={{fontSize:9,color:C.dim,marginLeft:4}}>{"(" + last.date + ")"}</span>);
      }
    }
    if (stall >= 2) {
      parts.push(<button key="stall" onClick={function(e){e.stopPropagation();setPopup({type:"stall",id:exName,muscle:muscle});}} style={{fontSize:9,fontWeight:700,fontFamily:FD,letterSpacing:1,color:"#000",background:C.red,border:"none",borderRadius:4,padding:"2px 6px",marginLeft:6,cursor:"pointer"}}>STALLED</button>);
    } else if (stall === -1) {
      parts.push(<span key="fatigue" style={{fontSize:9,fontWeight:700,fontFamily:FD,letterSpacing:1,color:C.pur,marginLeft:6}}>FATIGUED</span>);
    } else if (stall === 1) {
      parts.push(<span key="warn" style={{fontSize:9,fontWeight:700,fontFamily:FD,letterSpacing:1,color:C.orn,marginLeft:6}}>WATCH</span>);
    }
    var stallIdx = getStallStep(exName);
    if (stallIdx >= 0) {
      var sTier=STALL_LADDER[stallIdx].tier;
      var sCol=sTier===1?C.acc:sTier===2?C.orn:C.red;

    }
    return <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:2,marginTop:2}}>{parts}</div>;
  }

  // ═══ DRAG-TO-REORDER HELPERS ═══
  function reorderExercise(dayIdx, fromIdx, toIdx) {
    if (fromIdx === toIdx) return;
    setProgram(function(prev) {
      var np = JSON.parse(JSON.stringify(prev));
      var exs = np[dayIdx].exercises;
      var moved = exs.splice(fromIdx, 1)[0];
      exs.splice(toIdx, 0, moved);
      return np;
    });

        {cd(<div>{hd("SESSION STATS")}<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}}>{(function(){var ts=0,tv=0,rirSum=0,rirCount=0;Object.keys(log).forEach(function(k){if(k.indexOf(aDay+"-")===0&&log[k]){log[k].sets.forEach(function(s){if(s&&s.w&&s.r){ts++;tv+=s.w*s.r;}if(s&&s.rir!==undefined&&s.rir!==null){rirSum+=s.rir;rirCount++;}});}});var avgRir=rirCount>0?Math.round(rirSum/rirCount*10)/10:null;var avgRPE=avgRir!==null?(10-avgRir).toFixed(1):null;var timeVal=actualMin>0?actualMin+"m":(program[aDay]?program[aDay].est:"--")+"m";var timeCol=actualMin>0?(actualMin>(program[aDay]?program[aDay].est:99)?C.orn:C.grn):C.grn;return[{l:"Sets",v:ts||"--",c:C.acc},{l:"Volume",v:tv>0?Math.round(tv/1000)+"k lbs":"--",c:C.blu},{l:"Avg RPE",v:avgRPE||"--",c:avgRPE>=9?C.red:avgRPE>=7.5?C.orn:C.grn},{l:"Time",v:timeVal,c:timeCol}];})().map(function(s){return <div key={s.l} style={{background:C.bar,borderRadius:12,padding:12,textAlign:"center"}}><div style={{fontSize:9,color:C.dim,fontFamily:FD,letterSpacing:1}}>{s.l}</div><div style={{fontSize:18,fontWeight:700,fontFamily:FD,color:s.c,marginTop:4}}>{s.v}</div></div>;})}</div></div>)}

        {(function(){

        {sessionSaved&&cd(<div style={{textAlign:"center"}}><div style={{fontSize:12,fontWeight:700,fontFamily:FD,letterSpacing:2,color:C.grn}}>SESSION SAVED</div><div style={{fontSize:10,color:C.dim,marginTop:4}}>{"Session #"+(sessIdx.length)+" recorded. History will power your next workout."}</div></div>,C.grn+"30")}

        </div>
      </div>)}

      {/* ═══ REST / READY FOR NEXT ═══ */}
      {view==="rest"&&(<div>
        <div style={{textAlign:"center",padding:"40px 0 20px"}}>
          <MoveIcon type="cardio" size={64}/>
          <div style={{fontSize:28,fontFamily:FD,letterSpacing:3,marginTop:16}}>REST DAY</div>
          {program[aDay+1]?<div style={{fontSize:13,color:C.dim,marginTop:8,lineHeight:1.6}}>{"Day "+(aDay+1)+" complete. Next up: Day "+(aDay+2)+" - "+program[aDay+1].label+"."}</div>:<div style={{fontSize:13,color:C.dim,marginTop:8,lineHeight:1.6}}>{"Day "+(aDay+1)+" complete. All workouts in this week are done."}</div>}
